<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Retail Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ══ Plaid-style Design System ══ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:       #FF3D2E;
    --red-dark:  #D42D1F;
    --red-pale:  #FFF0EE;
    --black:     #111111;
    --gray-900:  #222222;
    --gray-700:  #444444;
    --gray-500:  #777777;
    --gray-300:  #CCCCCC;
    --gray-100:  #F5F5F5;
    --white:     #FFFFFF;
    --blue-dot:  #1650FF;
    --font-display: 'Noto Sans TC', 'Microsoft JhengHei', Helvetica, Arial, sans-serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --success: #1a8a4a;
    --error:   #FF3D2E;
  }

  html, body {
    font-family: var(--font-display);
    font-size: 15px; line-height: 1.6;
    background: var(--white); color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  /* ── App shell ── */
  #app-root { display: flex; flex-direction: column; width: 100%; height: 100vh; overflow: hidden; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 9999; gap: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--gray-300); border-top-color: var(--red);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { color: var(--gray-500); font-size: 13px; letter-spacing: .06em; }

  /* ── Tab header ── */
  #app-header {
    background: var(--black); flex-shrink: 0;
    border-bottom: 3px solid var(--red);
    padding: 0 32px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo {
    font-size: 12px; font-weight: 700; letter-spacing: .12em;
    color: var(--white); text-transform: uppercase; white-space: nowrap;
    padding: 14px 0;
  }
  #tab-bar {
    display: flex; gap: 0; overflow-x: auto;
    scrollbar-width: none; padding-top: 0;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    white-space: nowrap; padding: 14px 18px;
    font-size: 11px; font-family: var(--font-display);
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    background: transparent; color: rgba(255,255,255,.45);
    border: none; border-bottom: 3px solid transparent;
    cursor: pointer; transition: color .15s, border-color .15s;
    margin-bottom: -3px;
  }
  .tab-btn:hover { color: rgba(255,255,255,.85); }
  .tab-btn.active { color: var(--white); border-bottom-color: var(--red); }

  /* ── Content area ── */
  #content-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--gray-300) transparent;
  }
  #content-area::-webkit-scrollbar { width: 4px; }
  #content-area::-webkit-scrollbar-thumb { background: var(--gray-300); }
  .section { display: none; }
  .section.active { display: block; }

  /* ── Data Banner ── */
  #data-banner {
    background: var(--gray-100); border-bottom: 1px solid var(--gray-300);
    padding: 10px 32px; display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--gray-700); flex-wrap: wrap;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300); flex-shrink: 0; }
  .dot.ok  { background: var(--success); }
  .dot.err { background: var(--error); }
  #data-banner input {
    flex: 1; min-width: 0; border: 1px solid var(--gray-300);
    padding: 6px 10px; font-size: 12px; font-family: var(--font-mono);
    color: var(--black); background: var(--white);
  }
  #data-banner input:focus { outline: none; border-color: var(--red); }
  #data-banner button {
    padding: 6px 14px; background: var(--black); color: var(--white);
    border: none; cursor: pointer; font-size: 12px;
    font-family: var(--font-display); font-weight: 700;
    letter-spacing: .06em; transition: background .15s;
  }
  #data-banner button:hover { background: var(--red); }
  #data-banner .btn-ghost {
    background: transparent; border: 1px solid var(--gray-300);
    color: var(--gray-700);
  }
  #data-banner .btn-ghost:hover { border-color: var(--red); color: var(--red); background: transparent; }

  /* ── Section title ── */
  .section-title {
    font-size: 28px; font-weight: 800; color: var(--black);
    padding: 28px 32px 6px; letter-spacing: -.01em;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::before {
    content: ''; width: 6px; height: 28px;
    background: var(--red); flex-shrink: 0;
  }
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--gray-500);
    padding: 20px 32px 0;
  }

  /* ── Panel / Card ── */
  .panel {
    background: var(--white); border: 1px solid var(--gray-300);
    border-top: 3px solid var(--black);
    padding: 20px 24px; margin: 0 32px 16px;
  }
  .panel h3 {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--gray-500);
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--gray-100);
  }

  /* ── KPI Cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; padding: 0 32px 16px; }
  .kpi-card {
    background: var(--gray-100); padding: 18px 16px;
    border-top: 3px solid var(--black);
    transition: border-color .15s;
  }
  .kpi-card:hover { border-top-color: var(--red); }
  .kpi-val { font-size: 32px; font-weight: 800; color: var(--black); line-height: 1; margin-bottom: 4px; }
  .kpi-label { font-size: 11px; color: var(--gray-500); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }

  /* ── Controls ── */
  .ctrl-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; min-width: 120px; flex: 1; }
  .ctrl-group label {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--gray-500);
  }
  .ctrl-group select, .ctrl-group input[type="text"] {
    padding: 7px 10px; border: 1px solid var(--gray-300);
    font-size: 13px; font-family: var(--font-display);
    background: var(--white); color: var(--black);
    transition: border-color .15s;
  }
  .ctrl-group select:focus, .ctrl-group input:focus {
    outline: none; border-color: var(--red);
  }

  /* ── Buttons ── */
  .btn {
    padding: 7px 16px; border: none; font-family: var(--font-display);
    font-size: 12px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer; transition: background .15s;
  }
  .btn-primary { background: var(--black); color: var(--white); }
  .btn-primary:hover { background: var(--red); }
  .btn-ghost {
    background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700);
  }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }

  /* ── Search results ── */
  .result-count {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--gray-500);
    padding: 0 32px 8px;
  }
  .brand-list { display: flex; flex-direction: column; gap: 0; margin: 0 32px; border: 1px solid var(--gray-300); }
  .brand-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 80px;
    padding: 10px 14px; border-bottom: 1px solid var(--gray-100);
    font-size: 13px; align-items: center;
    transition: background .12s;
  }
  .brand-row:hover { background: var(--gray-100); }
  .brand-row:last-child { border-bottom: none; }
  .brand-name { font-weight: 700; color: var(--black); }
  .brand-meta { color: var(--gray-500); font-size: 12px; }
  .floor-tag {
    display: inline-block; background: var(--black); color: var(--white);
    font-size: 10px; font-weight: 700; padding: 2px 7px; letter-spacing: .06em;
  }

  /* ── Heatmap ── */
  .hm-grid { display: grid; gap: 2px; padding: 0 32px 16px; }
  .hm-cell {
    padding: 6px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: opacity .15s; letter-spacing: .04em;
  }
  .hm-row-label { font-size: 11px; color: var(--gray-500); font-weight: 600; padding: 6px 0; display: flex; align-items: center; }
  .hm-col-label { font-size: 10px; color: var(--gray-500); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }

  /* ── Scroll box ── */
  .scroll-box { max-height: 320px; overflow-y: auto; scrollbar-width: thin; }
  .scroll-box::-webkit-scrollbar { width: 3px; }
  .scroll-box::-webkit-scrollbar-thumb { background: var(--gray-300); }

  /* ── Matrix ── */
  .matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .matrix-table th {
    background: var(--black); color: var(--white);
    padding: 8px 12px; text-align: left;
    font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .matrix-table td { padding: 8px 12px; border-bottom: 1px solid var(--gray-100); }
  .matrix-table tr:hover td { background: var(--gray-100); }

  /* ── Tab pills (rpt-tab style) ── */
  .rpt-tab-btn {
    padding: 6px 18px; border: 1px solid var(--gray-300);
    background: transparent; color: var(--gray-700);
    font-family: var(--font-display); font-size: 11px;
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; transition: all .15s;
  }
  .rpt-tab-btn:hover { border-color: var(--red); color: var(--red); }
  .rpt-tab-active { background: var(--black); border-color: var(--black); color: var(--white) !important; }

  /* ── Report cards ── */
  .report-card { background: var(--white); border: 1px solid var(--gray-300); border-left: 4px solid var(--red); margin-bottom: 10px; }
  .report-card-header { display: flex; align-items: flex-start; gap: 12px; padding: 16px 18px; cursor: pointer; transition: background .12s; }
  .report-card-header:hover { background: var(--gray-100); }
  .report-period-badge { background: var(--black); color: var(--white); padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: .06em; font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0; }
  .report-card-meta { flex: 1; min-width: 0; }
  .report-card-title { font-size: 16px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
  .report-card-summary { font-size: 13px; color: var(--gray-500); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .report-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .report-tag { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); padding: 1px 7px; font-size: 10px; font-weight: 700; letter-spacing: .04em; }
  .risk-badge { padding: 2px 8px; font-size: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0; letter-spacing: .04em; }
  .risk-high { background: #FFF0EE; color: var(--red); border: 1px solid #FFBDB8; }
  .risk-mid  { background: #FFFBF0; color: #B87A00; border: 1px solid #FFE499; }
  .risk-low  { background: #F0FFF6; color: #1a8a4a; border: 1px solid #99DDBB; }
  .report-toggle { font-size: 16px; color: var(--gray-500); flex-shrink: 0; }
  .report-card-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--gray-100); }
  .report-card-body.open { display: block; }
  .report-body-content { padding-top: 14px; font-size: 14px; line-height: 1.8; color: var(--black); white-space: pre-wrap; }
  .report-body-content h4 { font-size: 13px; font-weight: 700; color: var(--black); margin: 12px 0 5px; border-left: 3px solid var(--red); padding-left: 8px; text-transform: uppercase; letter-spacing: .06em; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--gray-500); font-size: 13px; letter-spacing: .04em; }

  /* ── Bar chart ── */
  .bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .bar-track { flex: 1; background: var(--gray-100); height: 20px; position: relative; }
  .bar-fill { height: 100%; background: var(--black); transition: width .4s; }
  .bar-fill.accent { background: var(--red); }
  .bar-val { font-size: 12px; font-weight: 700; color: var(--black); min-width: 32px; text-align: right; }
  .bar-label { min-width: 80px; color: var(--gray-700); font-size: 11px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

  /* ── Map ── */
  #leafletMap { height: 420px; overflow: hidden; border: 1px solid var(--gray-300); }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--gray-700); padding: 8px 0; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.12); }

  /* ── Comparison ── */
  .cp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cp-panel { border: 1px solid var(--gray-300); border-top: 3px solid var(--black); padding: 16px; }
  .cp-panel h4 { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 12px; }
  .cp-panel.accent { border-top-color: var(--red); }

  /* ── Competition ── */
  .comp-rank { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .comp-num { font-size: 28px; font-weight: 800; color: var(--black); line-height: 1; }
  .comp-name { font-size: 14px; font-weight: 700; color: var(--black); }

  /* ── Misc ── */
  .tag {
    display: inline-block; background: var(--gray-100); color: var(--gray-700);
    border: 1px solid var(--gray-300); padding: 1px 7px;
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
  }
  .tag.red { background: var(--red-pale); color: var(--red); border-color: #FFBDB8; }

  /* ── Page1 news specific ── */
  .news-section { background: var(--white); padding: 0; }
  .news-ctrl-bar {
    background: var(--gray-100); border-bottom: 1px solid var(--gray-300);
    padding: 10px 32px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .news-ctrl-bar input {
    padding: 7px 12px; border: 1px solid var(--gray-300);
    font-size: 12px; background: var(--white); color: var(--black); min-width: 180px;
  }
  .news-ctrl-bar input:focus { outline: none; border-color: var(--red); }
  .news-ctrl-bar select {
    padding: 7px 10px; border: 1px solid var(--gray-300);
    font-size: 12px; background: var(--white); color: var(--black);
  }
  #news-status {
    font-size: 11px; color: var(--gray-500); font-family: var(--font-mono);
    padding: 8px 32px; min-height: 18px; letter-spacing: .04em;
    background: var(--white);
  }
  #news-grid { padding: 0 32px 24px; }

  /* Hero news card */
  .news-hero-card {
    background: var(--white); border: 1px solid var(--gray-300);
    border-top: none; display: grid; grid-template-columns: 2fr 3fr;
    margin-bottom: 12px; min-height: 200px; transition: border-color .2s;
  }
  .news-hero-card:hover { border-color: var(--red); }
  .news-hero-img { background: var(--gray-100); overflow: hidden; }
  .news-hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .news-hero-body { padding: 24px 28px; display: flex; flex-direction: column; justify-content: space-between; border-left: 4px solid var(--red); }
  .news-hero-rank { display: inline-block; background: var(--black); color: var(--white); font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 2px 8px; letter-spacing: .06em; margin-bottom: 10px; }
  .news-hero-cat { font-size: 9px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
  .news-hero-title { font-size: 18px; font-weight: 800; color: var(--black); line-height: 1.4; margin-bottom: 8px; }
  .news-hero-desc { font-size: 13px; color: var(--gray-700); line-height: 1.65; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
  .news-hero-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--gray-100); font-size: 11px; color: var(--gray-500); }

  /* 3-col rows */
  .news-row3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 12px; align-items: start; }
  .news-card { background: var(--white); border: 1px solid var(--gray-300); display: flex; flex-direction: column; transition: border-color .2s; overflow: visible !important; height: auto !important; }
  /* 頭條卡片 */
  /* 頭條 grid：左大右四小 */
  /* 頭條清單樣式 */
  .headline-row { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid var(--gray-100); }
  .headline-row:first-child { padding-top:0; }
  .headline-row:last-child { border-bottom:none; }
  .headline-num { font-size:16px; font-weight:800; font-family:var(--font-mono); color:var(--red); min-width:24px; flex-shrink:0; line-height:1.4; }
  .headline-body { flex:1; min-width:0; }
  .headline-title { font-size:14px; font-weight:700; color:var(--black); line-height:1.45; margin-bottom:6px; }
  .headline-meta { font-size:11px; color:var(--gray-500); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    @media (max-width: 700px) { .news-row3 { grid-template-columns: 1fr; } .news-hero-card { grid-template-columns: 1fr; } }

  /* Small card */
  .news-card:hover { border-color: var(--red); }
  .news-card-rank { display: inline-block; background: var(--black); color: var(--white); font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 1px 6px; margin-bottom: 6px; }
  .news-card-img { width: 100%; height: 120px; overflow: hidden; flex-shrink: 0; }
  .news-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .news-card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .news-card-cat { font-size: 9px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .1em; }
  .news-card-title { font-size: 13px; font-weight: 700; color: var(--black); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .news-card-desc { font-size: 11px; color: var(--gray-700); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
  .news-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--gray-100); font-size: 10px; color: var(--gray-500); }
  .news-card-analyze { font-size: 10px; font-weight: 700; color: var(--red); background: var(--red-pale); padding: 2px 8px; border: none; cursor: pointer; font-family: var(--font-display); letter-spacing: .04em; }
  .news-card-analyze:hover { background: #FFD0CC; }

  /* Section divider */
  .section-divider { background: var(--black); color: var(--white); padding: 12px 32px; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .section-divider::before { content: ''; width: 4px; height: 16px; background: var(--red); flex-shrink: 0; }

  /* Analysis hero */
  .hero-section { background: var(--black); color: var(--white); padding: 48px 32px; position: relative; overflow: hidden; }
  .hero-blob { position: absolute; background: var(--red); opacity: .85; pointer-events: none; right: -60px; top: -60px; width: 280px; height: 220px; border-radius: 55% 45% 60% 40%; }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; position: relative; z-index: 1; }
  @media (max-width: 760px) { .hero-grid { grid-template-columns: 1fr; } }
  .hero-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; }
  .hero-title { font-size: clamp(32px,5vw,52px); font-weight: 800; line-height: 1.05; margin-bottom: 12px; }
  .hero-sub { font-size: 13px; opacity: .65; line-height: 1.7; margin-bottom: 20px; max-width: 360px; }
  .key-block { margin-bottom: 14px; }
  .key-label { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: 6px; }
  .key-row { display: flex; gap: 8px; }
  .key-row input { flex: 1; padding: 8px 12px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: var(--white); font-family: var(--font-display); font-size: 12px; }
  .key-row input::placeholder { color: rgba(255,255,255,.35); }
  .key-row input:focus { outline: none; border-color: var(--red); }

<script>
const CARD_CATS = ['台灣零售','百貨動態','電商','實體零售','快時尚','品牌動態','投資併購','供應鏈','消費趨勢','購物中心'];
let GEMINI_KEY = localStorage.getItem('gemini_key') || '';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyyxp8hFOYxp2rtdektwOW_FEqDSZMjoz_dXdPB04cLq2x9CqqNiqRRGxOQrJUmYjTb/exec';

// ════════════════════════════════════
// 載入新聞
// ════════════════════════════════════
async function loadNews() {
  const statusEl = document.getElementById('news-status');
  const gridEl   = document.getElementById('news-grid');
  statusEl.textContent = '載入新聞中…';
  gridEl.innerHTML = '<div class="empty-state" style="padding:60px 20px"><div style="font-size:28px;margin-bottom:12px">📡</div><div>載入中，請稍候…</div></div>';

  try {
    const resp = await fetch(GAS_URL + '?q=' + encodeURIComponent('零售 OR 百貨 OR 電商 OR 購物中心 OR 快時尚 OR 量販 OR 超市 OR 超商') + '&n=50');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.status === 'error') throw new Error(data.message || '載入失敗');
    if (!data.news || !data.news.length) throw new Error('目前找不到相關新聞，請稍後再試');

    const normalized = data.news.map((a, i) => ({
      title:    a.title   || '',
      desc:     a.desc    || '',
      link:     a.link    || '',
      source:   a.source  || '',
      pubDate:  a.pubDate || '',
      category: CARD_CATS[i % CARD_CATS.length]
    }));

    // ── 來源權重排序 ──
    const SOURCE_WEIGHT = {
      // 高權重：產業專業媒體（3分）
      '經濟日報': 3, '工商時報': 3, '遠見雜誌': 3, '今周刊': 3,
      '未來流通研究所': 3, '數位時代': 3, '經理人': 3, '食力 foodNEXT': 3,
      'managertoday.com.tw': 3,
      // 中權重：主流財經/新聞媒體（2分）
      '聯合新聞網': 2, '中時新聞網': 2, '風傳媒': 2, '商業周刊': 2,
      '天下雜誌': 2, '信報網站': 2, 'ETtoday': 2, '自由財經': 2,
      'TNL The News Lens 關鍵評論網': 2, 'Yahoo財經': 2, 'Yahoo 財經': 2,
      'news.cnyes.com': 2, 'Vogue Taiwan': 2, 'GQ Taiwan': 2,
      // 低權重：一般新聞（1分，預設）
    };
    function getWeight(source) {
      for (const [key, w] of Object.entries(SOURCE_WEIGHT)) {
        if (source && source.includes(key)) return w;
      }
      return 1;
    }
    // 時間衰減（7天內線性衰減）
    const nowMs = Date.now();
    function getTimeFactor(pubDate) {
      const m = pubDate && pubDate.match(/(\d{4})\/(\d+)\/(\d+)/);
      if (!m) return 0.5;
      const ageDays = (nowMs - new Date(+m[1], +m[2]-1, +m[3]).getTime()) / 86400000;
      return Math.max(0.1, 1 - ageDays / 7);
    }
    // 綜合分數 = 來源權重 × 時間衰減
    const scored = normalized
      .map(item => ({ ...item, _score: getWeight(item.source) * getTimeFactor(item.pubDate) }))
      .sort((a, b) => b._score - a._score);

    // 有 Gemini Key → AI 挑頭條；否則取最高分前 5 則
    if (GEMINI_KEY) {
      await pickHeadlines(scored);
    } else {
      renderHeadlines(scored.slice(0, 5), false);
      renderCards(scored.slice(5));
    }
    statusEl.textContent = `共 ${scored.length} 則（來源權重排序）· Google News · ${new Date().toLocaleString('zh-TW')}`;
  } catch(err) {
    console.error(err);
    document.getElementById('news-grid').innerHTML =
      '<div class="empty-state">' +
      '<div style="font-size:28px;margin-bottom:10px">📡</div>' +
      '<div style="font-weight:600;margin-bottom:8px">新聞載入失敗</div>' +
      '<div style="font-size:11px;font-family:var(--font-mono);background:var(--gray-100);padding:8px 12px;max-width:500px;margin:8px auto 14px">' + escT(err.message) + '</div>' +
      '<button onclick="loadNews()" style="padding:8px 18px;background:var(--red);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;margin-right:8px">🔄 重試</button>' +
      '<a href="https://news.google.com/search?q=' + encodeURIComponent('零售 百貨 電商') + '&hl=zh-TW&gl=TW" target="_blank" style="padding:8px 16px;border:1px solid var(--gray-300);color:var(--gray-700);font-size:12px;text-decoration:none">🔗 Google 新聞</a>' +
      '</div>';
    document.getElementById('news-status').textContent = '';
  }
}

// ════════════════════════════════════
// Gemini AI 摘要（單則）
// ════════════════════════════════════
async function generateSummary(idx) {
  const btn = document.getElementById('ai-btn-' + idx);
  const title  = btn.dataset.title;
  const desc   = btn.dataset.desc;
  const source = btn.dataset.source;
  const link   = btn.dataset.link;
  openAnalysisPage({ title, desc, source, link });
}

// 開啟產業分析頁面（新分頁）
async function openAnalysisPage(item) {
  if (!GEMINI_KEY) {
    alert('請先在上方輸入並儲存 Gemini API Key');
    return;
  }

  // 顯示分析區塊並滾動到那裡
  const panel = document.getElementById('inline-analysis');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 填入新聞資訊
  document.getElementById('ia-news-title').textContent  = item.title || '';
  document.getElementById('ia-news-source').textContent = (item.source||'') + (item.pubDate ? '  ·  ' + item.pubDate : '');
  document.getElementById('ia-source-meta').textContent = item.source || '—';
  document.getElementById('ia-status').textContent = '分析中…';
  document.getElementById('ia-status').style.color = '';
  if (item.link) {
    const lnk = document.getElementById('ia-link');
    lnk.href = item.link;
    lnk.style.display = 'inline-block';
  }

  // 重置內容
  document.getElementById('ia-focus').innerHTML =
    '<div style="display:flex;gap:10px;align-items:center"><div style="width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite"></div><span style="color:rgba(255,255,255,.5);font-size:12px">AI 分析中，請稍候…</span></div>';
  document.getElementById('ia-strategy').textContent = '分析生成中…';
  document.getElementById('ia-strategy').style.fontStyle = 'italic';

  const prompt = '你是資深零售產業分析師。針對以下新聞，用繁體中文分析，只回傳 JSON 不要 markdown：\n\n新聞標題：' + item.title + '\n新聞摘要：' + (item.desc||'（無摘要）') + '\n來源：' + (item.source||'') + '\n\n回傳格式：\n{"focus":"【事件】80字，說明核心事件、涉及品牌或市場","strategy":"【分析】120字，說明為何重要、對零售產業的影響與趨勢","source_short":"來源媒體簡稱","scope":"台灣零售或全球零售"}';

  try {
    const resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_KEY,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 8192, temperature: 0.6, responseMimeType: 'application/json' }
        })
      }
    );
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const raw  = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const finishReason = data.candidates?.[0]?.finishReason || '';
    if (!raw) throw new Error('AI 未回傳內容');

    const r = JSON.parse(raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/,'').trim());

    document.getElementById('ia-focus').innerHTML = '<div style="font-size:14px;line-height:1.85">' + escT(r.focus||'') + '</div>';
    document.getElementById('ia-strategy').textContent = r.strategy || '';
    document.getElementById('ia-strategy').style.fontStyle = 'normal';
    document.getElementById('ia-source-meta').textContent = r.source_short || item.source || '—';
    document.getElementById('ia-scope').textContent = r.scope || 'Global Retail · TW Focus';
    document.getElementById('ia-status').textContent = finishReason === 'STOP' ? '正常 · ' + new Date().toLocaleTimeString('zh-TW') : finishReason;
    document.getElementById('ia-status').style.color = finishReason === 'STOP' ? 'var(--red)' : '';

  } catch(err) {
    document.getElementById('ia-focus').innerHTML = '<div style="color:rgba(255,61,46,.9);font-size:13px">分析失敗：' + escT(err.message) + '</div>';
    document.getElementById('ia-strategy').textContent = '';
    document.getElementById('ia-status').textContent = '錯誤';
    document.getElementById('ia-status').style.color = 'var(--red)';
  }
}

// ════════════════════════════════════
// 頭條選取（Gemini AI）
// ════════════════════════════════════
async function pickHeadlines(allItems) {
  // 先用前 5 則當預設顯示，等 Gemini 回應再更新
  renderHeadlines(allItems.slice(0, 5), false);
  renderCards(allItems.slice(5));

  try {
    const titles = allItems.map((a, i) => (i + 1) + '. ' + a.title).join('\n');
    const prompt = `以下是今日零售產業新聞清單，請從中選出最值得關注的 5 則頭條新聞（以重要性、影響力、話題性為標準）。只回傳 5 個編號，用逗號分隔，例如：3,7,12,25,41

新聞清單：
${titles}

只回傳數字，不要任何解釋。`;

    const resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_KEY,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 32, temperature: 0.3 }
        })
      }
    );
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const indices = raw.match(/\d+/g);
    if (!indices || indices.length < 3) throw new Error('回傳格式異常');

    // 取 Gemini 選出的編號（1-based → 0-based）
    const picked = indices.slice(0, 5).map(n => parseInt(n) - 1).filter(i => i >= 0 && i < allItems.length);
    const headlines = picked.map(i => allItems[i]);
    const rest = allItems.filter((_, i) => !picked.includes(i));

    renderHeadlines(headlines, true);
    renderCards(rest);
    document.getElementById('headline-badge').textContent = 'AI 精選';
  } catch(e) {
    console.warn('AI 頭條選取失敗，使用最新前 5 則:', e.message);
    // 失敗就保持預設的前 5 則
  }
}

function renderHeadlines(items, isAI) {
  const sec   = document.getElementById('headline-section');
  const listEl = document.getElementById('headline-list');
  const label = document.getElementById('news-section-label');
  if (!items.length) return;

  sec.style.display   = '';
  label.style.display = 'flex';
  if (!isAI) document.getElementById('headline-badge').textContent = '最新';

  var html = '';
  items.slice(0, 5).forEach(function(item, i) {
    html +=
      '<div class="headline-row">' +
      '<div class="headline-num">' + (i + 1) + '.</div>' +
      '<div class="headline-body">' +
      '<div class="headline-title">' + escT(item.title) + '</div>' +
      '<div class="headline-meta">' +
      escT(item.source||'') + (item.pubDate ? ' · ' + escT(item.pubDate) : '') +
      '<a href="' + escAttr(item.link) + '" target="_blank" rel="noopener" ' +
      'style="padding:2px 8px;background:var(--black);color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;text-decoration:none;white-space:nowrap">🔗 原始新聞</a>' +
      '<button id="ai-btn-h' + i + '" onclick="generateSummaryH(' + i + ')" ' +
      'data-title="' + escAttr(item.title) + '" data-desc="' + escAttr(item.desc||'') + '" ' +
      'data-source="' + escAttr(item.source||'') + '" data-link="' + escAttr(item.link||'') + '" ' +
      'style="padding:2px 8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;border:none;cursor:pointer;white-space:nowrap">✨ AI 摘要</button>' +
      '</div>' +
      '</div></div>';
  });
  listEl.innerHTML = html;
}

// AI 摘要（頭條卡片專用）— 開新分析頁面
function generateSummaryH(idx) {
  const btn = document.getElementById('ai-btn-h' + idx);
  const title  = btn.dataset.title;
  const desc   = btn.dataset.desc;
  const source = btn.dataset.source;
  const link   = btn.dataset.link;
  openAnalysisPage({ title, desc, source, link });
}

// ════════════════════════════════════
// 渲染卡片
// ════════════════════════════════════
function cardButtons(item, idx) {
  return '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">' +
    '<a href="' + escAttr(item.link) + '" target="_blank" rel="noopener" ' +
    'style="padding:4px 10px;background:var(--black);color:#fff;font-size:10px;font-weight:700;' +
    'letter-spacing:.06em;text-decoration:none;white-space:nowrap">🔗 原始新聞</a>' +
    '<button id="ai-btn-' + idx + '" onclick="generateSummary(' + idx + ')" ' +
    'data-title="' + escAttr(item.title) + '" ' +
    'data-desc="' + escAttr(item.desc) + '" ' +
    'data-source="' + escAttr(item.source) + '" ' +
    'data-link="' + escAttr(item.link) + '" ' +
    'style="padding:4px 10px;background:var(--red);color:#fff;font-size:10px;font-weight:700;' +
    'letter-spacing:.06em;border:none;cursor:pointer;white-space:nowrap">✨ AI 摘要</button>' +
    '</div>' +
    '<div id="ai-box-' + idx + '" style="display:none;margin-top:8px"></div>';
}

function cardFooter(item) {
  return '<div class="news-card-footer">' +
    '<span style="font-size:11px;color:var(--gray-500)">' +
    escT(item.source || '') + (item.pubDate ? '&nbsp;·&nbsp;' + escT(item.pubDate) : '') +
    '</span></div>';
}

function renderCards(items) {
  const grid = document.getElementById('news-grid');
  if (!items.length) { grid.innerHTML = '<div class="empty-state">找不到相關新聞</div>'; return; }

  // 統一三欄，不再有第一則獨立大橫幅
  var html = '';
  for (var rs = 0; rs < items.length; rs += 3) {
    html += '<div class="news-row3">';
    items.slice(rs, rs + 3).forEach(function(item, ri) {
      var i = rs + ri;
      html += '<div class="news-card">' +
        '<div class="news-card-body">' +
        '<div class="news-card-rank">#' + (i + 1) + '</div>' +
        '<div class="news-card-cat">' + escT(item.category) + '</div>' +
        '<div class="news-card-title">' + escT(item.title) + '</div>' +
        cardFooter(item) +
        cardButtons(item, i) +
        '</div></div>';
    });
    html += '</div>';
  }
  grid.innerHTML = html;
}

function openGoogleNews() {
  window.open('https://news.google.com/search?q=' + encodeURIComponent('零售 百貨 電商') + '&hl=zh-TW&gl=TW', '_blank');
}

function escT(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,"&#39;"); }

// ── Gemini Key 管理 ──
function saveGeminiKey() {
  const val = document.getElementById('gemini-key-input').value.trim();
  if (!val) { alert('請貼上 Gemini API Key'); return; }
  GEMINI_KEY = val;
  localStorage.setItem('gemini_key', val);
  document.getElementById('gemini-key-input').value = '';
  document.getElementById('gemini-key-input').placeholder = 'Key 已儲存 ✓';
  document.getElementById('gemini-key-status').textContent = '✓ 已儲存，AI 摘要功能已啟用';
  document.getElementById('gemini-key-status').style.color = 'var(--success)';
}

function clearGeminiKey() {
  GEMINI_KEY = '';
  localStorage.removeItem('gemini_key');
  document.getElementById('gemini-key-input').value = '';
  document.getElementById('gemini-key-input').placeholder = '貼上你的 Gemini API Key…';
  document.getElementById('gemini-key-status').textContent = 'Key 已清除';
  document.getElementById('gemini-key-status').style.color = 'var(--gray-500)';
}

document.addEventListener('DOMContentLoaded', () => {
  // 讀取已儲存的 Key
  const saved = localStorage.getItem('gemini_key');
  if (saved) {
    GEMINI_KEY = saved;
    document.getElementById('gemini-key-input').placeholder = 'Key 已儲存 ✓';
    document.getElementById('gemini-key-status').textContent = '✓ Key 已載入，AI 摘要功能已啟用';
    document.getElementById('gemini-key-status').style.color = 'var(--success)';
  }
  loadNews();
});
</script>
