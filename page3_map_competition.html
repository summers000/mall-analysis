<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百貨分析 — 地圖與競爭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  /* ══ Plaid-style Design System ══ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:       #FF3D2E;
    --red-dark:  #D42D1F;
    --red-pale:  #FFF0EE;
    --black:     #111111;
    --gray-900:  #222222;
    --gray-700:  #444444;
    --gray-500:  #777777;
    --gray-300:  #CCCCCC;
    --gray-100:  #F5F5F5;
    --white:     #FFFFFF;
    --blue-dot:  #1650FF;
    --font-display: 'Noto Sans TC', 'Microsoft JhengHei', Helvetica, Arial, sans-serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --success: #1a8a4a;
    --error:   #FF3D2E;
  }

  html, body {
    font-family: var(--font-display);
    font-size: 15px; line-height: 1.6;
    background: var(--white); color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  /* ── App shell ── */
  #app-root { display: flex; flex-direction: column; width: 100%; height: 100vh; overflow: hidden; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 9999; gap: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--gray-300); border-top-color: var(--red);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { color: var(--gray-500); font-size: 13px; letter-spacing: .06em; }

  /* ── Tab header ── */
  #app-header {
    background: var(--black); flex-shrink: 0;
    border-bottom: 3px solid var(--red);
    padding: 0 32px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo {
    font-size: 12px; font-weight: 700; letter-spacing: .12em;
    color: var(--white); text-transform: uppercase; white-space: nowrap;
    padding: 14px 0;
  }
  #tab-bar {
    display: flex; gap: 0; overflow-x: auto;
    scrollbar-width: none; padding-top: 0;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    white-space: nowrap; padding: 14px 18px;
    font-size: 11px; font-family: var(--font-display);
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    background: transparent; color: rgba(255,255,255,.45);
    border: none; border-bottom: 3px solid transparent;
    cursor: pointer; transition: color .15s, border-color .15s;
    margin-bottom: -3px;
  }
  .tab-btn:hover { color: rgba(255,255,255,.85); }
  .tab-btn.active { color: var(--white); border-bottom-color: var(--red); }

  /* ── Content area ── */
  #content-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--gray-300) transparent;
  }
  #content-area::-webkit-scrollbar { width: 4px; }
  #content-area::-webkit-scrollbar-thumb { background: var(--gray-300); }
  .section { display: none; }
  .section.active { display: block; }

  /* ── Data Banner ── */
  #data-banner {
    background: var(--gray-100); border-bottom: 1px solid var(--gray-300);
    padding: 10px 32px; display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--gray-700); flex-wrap: wrap;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300); flex-shrink: 0; }
  .dot.ok  { background: var(--success); }
  .dot.err { background: var(--error); }
  #data-banner input {
    flex: 1; min-width: 0; border: 1px solid var(--gray-300);
    padding: 6px 10px; font-size: 12px; font-family: var(--font-mono);
    color: var(--black); background: var(--white);
  }
  #data-banner input:focus { outline: none; border-color: var(--red); }
  #data-banner button {
    padding: 6px 14px; background: var(--black); color: var(--white);
    border: none; cursor: pointer; font-size: 12px;
    font-family: var(--font-display); font-weight: 700;
    letter-spacing: .06em; transition: background .15s;
  }
  #data-banner button:hover { background: var(--red); }
  #data-banner .btn-ghost {
    background: transparent; border: 1px solid var(--gray-300);
    color: var(--gray-700);
  }
  #data-banner .btn-ghost:hover { border-color: var(--red); color: var(--red); background: transparent; }

  /* ── Section title ── */
  .section-title {
    font-size: 28px; font-weight: 800; color: var(--black);
    padding: 28px 32px 6px; letter-spacing: -.01em;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::before {
    content: ''; width: 6px; height: 28px;
    background: var(--red); flex-shrink: 0;
  }
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--gray-500);
    padding: 20px 32px 0;
  }

  /* ── Panel / Card ── */
  .panel {
    background: var(--white); border: 1px solid var(--gray-300);
    border-top: 3px solid var(--black);
    padding: 20px 24px; margin: 0 32px 16px;
  }
  .panel h3 {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--gray-500);
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--gray-100);
  }

  /* ── KPI Cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; padding: 0 32px 16px; }
  .kpi-card {
    background: var(--gray-100); padding: 18px 16px;
    border-top: 3px solid var(--black);
    transition: border-color .15s;
  }
  .kpi-card:hover { border-top-color: var(--red); }
  .kpi-val { font-size: 32px; font-weight: 800; color: var(--black); line-height: 1; margin-bottom: 4px; }
  .kpi-label { font-size: 11px; color: var(--gray-500); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }

  /* ── Controls ── */
  .ctrl-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; min-width: 120px; flex: 1; }
  .ctrl-group label {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--gray-500);
  }
  .ctrl-group select, .ctrl-group input[type="text"] {
    padding: 7px 10px; border: 1px solid var(--gray-300);
    font-size: 13px; font-family: var(--font-display);
    background: var(--white); color: var(--black);
    transition: border-color .15s;
  }
  .ctrl-group select:focus, .ctrl-group input:focus {
    outline: none; border-color: var(--red);
  }

  /* ── Buttons ── */
  .btn {
    padding: 7px 16px; border: none; font-family: var(--font-display);
    font-size: 12px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer; transition: background .15s;
  }
  .btn-primary { background: var(--black); color: var(--white); }
  .btn-primary:hover { background: var(--red); }
  .btn-ghost {
    background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700);
  }
  .btn-ghost:hover { border-color: var(--red); color: var(--red); }

  /* ── Search results ── */
  .result-count {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--gray-500);
    padding: 0 32px 8px;
  }
  .brand-list { display: flex; flex-direction: column; gap: 0; margin: 0 32px; border: 1px solid var(--gray-300); }
  .brand-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 80px;
    padding: 10px 14px; border-bottom: 1px solid var(--gray-100);
    font-size: 13px; align-items: center;
    transition: background .12s;
  }
  .brand-row:hover { background: var(--gray-100); }
  .brand-row:last-child { border-bottom: none; }
  .brand-name { font-weight: 700; color: var(--black); }
  .brand-meta { color: var(--gray-500); font-size: 12px; }
  .floor-tag {
    display: inline-block; background: var(--black); color: var(--white);
    font-size: 10px; font-weight: 700; padding: 2px 7px; letter-spacing: .06em;
  }

  /* ── Heatmap ── */
  .hm-grid { display: grid; gap: 2px; padding: 0 32px 16px; }
  .hm-cell {
    padding: 6px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: opacity .15s; letter-spacing: .04em;
  }
  .hm-row-label { font-size: 11px; color: var(--gray-500); font-weight: 600; padding: 6px 0; display: flex; align-items: center; }
  .hm-col-label { font-size: 10px; color: var(--gray-500); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }

  /* ── Scroll box ── */
  .scroll-box { max-height: 320px; overflow-y: auto; scrollbar-width: thin; }
  .scroll-box::-webkit-scrollbar { width: 3px; }
  .scroll-box::-webkit-scrollbar-thumb { background: var(--gray-300); }

  /* ── Matrix ── */
  .matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .matrix-table th {
    background: var(--black); color: var(--white);
    padding: 8px 12px; text-align: left;
    font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .matrix-table td { padding: 8px 12px; border-bottom: 1px solid var(--gray-100); }
  .matrix-table tr:hover td { background: var(--gray-100); }

  /* ── Tab pills (rpt-tab style) ── */
  .rpt-tab-btn {
    padding: 6px 18px; border: 1px solid var(--gray-300);
    background: transparent; color: var(--gray-700);
    font-family: var(--font-display); font-size: 11px;
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; transition: all .15s;
  }
  .rpt-tab-btn:hover { border-color: var(--red); color: var(--red); }
  .rpt-tab-active { background: var(--black); border-color: var(--black); color: var(--white) !important; }

  /* ── Report cards ── */
  .report-card { background: var(--white); border: 1px solid var(--gray-300); border-left: 4px solid var(--red); margin-bottom: 10px; }
  .report-card-header { display: flex; align-items: flex-start; gap: 12px; padding: 16px 18px; cursor: pointer; transition: background .12s; }
  .report-card-header:hover { background: var(--gray-100); }
  .report-period-badge { background: var(--black); color: var(--white); padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: .06em; font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0; }
  .report-card-meta { flex: 1; min-width: 0; }
  .report-card-title { font-size: 16px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
  .report-card-summary { font-size: 13px; color: var(--gray-500); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .report-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .report-tag { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); padding: 1px 7px; font-size: 10px; font-weight: 700; letter-spacing: .04em; }
  .risk-badge { padding: 2px 8px; font-size: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0; letter-spacing: .04em; }
  .risk-high { background: #FFF0EE; color: var(--red); border: 1px solid #FFBDB8; }
  .risk-mid  { background: #FFFBF0; color: #B87A00; border: 1px solid #FFE499; }
  .risk-low  { background: #F0FFF6; color: #1a8a4a; border: 1px solid #99DDBB; }
  .report-toggle { font-size: 16px; color: var(--gray-500); flex-shrink: 0; }
  .report-card-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--gray-100); }
  .report-card-body.open { display: block; }
  .report-body-content { padding-top: 14px; font-size: 14px; line-height: 1.8; color: var(--black); white-space: pre-wrap; }
  .report-body-content h4 { font-size: 13px; font-weight: 700; color: var(--black); margin: 12px 0 5px; border-left: 3px solid var(--red); padding-left: 8px; text-transform: uppercase; letter-spacing: .06em; }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--gray-500); font-size: 13px; letter-spacing: .04em; }

  /* ── Bar chart ── */
  .bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .bar-track { flex: 1; background: var(--gray-100); height: 20px; position: relative; }
  .bar-fill { height: 100%; background: var(--black); transition: width .4s; }
  .bar-fill.accent { background: var(--red); }
  .bar-val { font-size: 12px; font-weight: 700; color: var(--black); min-width: 32px; text-align: right; }
  .bar-label { min-width: 80px; color: var(--gray-700); font-size: 11px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

  /* ── Map ── */
  #leafletMap { height: 420px; overflow: hidden; border: 1px solid var(--gray-300); }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--gray-700); padding: 8px 0; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.12); }

  /* ── Comparison ── */
  .cp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cp-panel { border: 1px solid var(--gray-300); border-top: 3px solid var(--black); padding: 16px; }
  .cp-panel h4 { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 12px; }
  .cp-panel.accent { border-top-color: var(--red); }

  /* ── Competition ── */
  .comp-rank { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .comp-num { font-size: 28px; font-weight: 800; color: var(--black); line-height: 1; }
  .comp-name { font-size: 14px; font-weight: 700; color: var(--black); }

  /* ── Misc ── */
  .tag {
    display: inline-block; background: var(--gray-100); color: var(--gray-700);
    border: 1px solid var(--gray-300); padding: 1px 7px;
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
  }
  .tag.red { background: var(--red-pale); color: var(--red); border-color: #FFBDB8; }
  /* ── Heatmap colors (red scale) ── */
  .hm-table { border-collapse:collapse; width:100%; font-size:12px; }
  .hm-table th { background:var(--black); color:var(--white); padding:6px 10px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; }
  .hm-table td { padding:5px 8px; text-align:center; font-size:11px; font-weight:600; border:1px solid #E8E8E8; min-width:36px; }
  .hi0 { background:#F5F5F5; color:#BBBBBB; }
  .hi1 { background:#FFE8E6; color:#CC2200; }
  .hi2 { background:#FFB8B3; color:#AA1500; }
  .hi3 { background:#FF7A72; color:#880000; }
  .hi4 { background:#FF3D2E; color:#ffffff; }
  .hi5 { background:#CC0000; color:#ffffff; }
  .venn-wrap { display:flex; justify-content:center; padding:8px 0; }
  .bar-track { flex:1; background:var(--gray-100); height:18px; position:relative; }
  .bar-fill { height:100%; background:var(--black); transition:width .4s; }
  .rank-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .rank-num { font-size:16px; font-weight:800; color:var(--red); min-width:28px; font-family:var(--font-mono); }

</style>
</head>
<body>
<div id="app-root">

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">載入中…</p>
</div>

<div id="app-header">
  <div class="header-logo">Retail Intel.</div>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="map">台灣百貨據點地圖</button>
    <button class="tab-btn" data-tab="compare">品牌覆蓋度比較</button>
    <button class="tab-btn" data-tab="competition">百貨競爭度分析</button>
  </div>
</div>

<div id="content-area">
  <!-- Data Source Banner -->
  <div id="data-banner">
    <div class="dot" id="ds-dot"></div>
    <span id="ds-status">未連接資料來源</span>
    <input type="text" id="sheets-url"
      placeholder="貼上 Google Sheets CSV 連結（欄位：mall_name, store_name, brand_name, category, floor）" />
    <button onclick="loadFromSheets()">載入</button>
    <button class="btn-ghost btn" onclick="loadSampleData()" style="margin-left:0">範例資料</button>
  </div>
  <div class="section active" id="sec-map">
    <div class="section-title">台灣百貨據點地圖</div>
    <div class="panel">
      <div class="ctrl-row">
        <div class="ctrl-group"><label>品牌篩選</label><select id="map-brand"><option value="">全部品牌</option></select></div>
        <div class="ctrl-group"><label>城市篩選</label><select id="map-city"><option value="">全部城市</option></select></div>
        <div class="ctrl-group"><label>樓層篩選</label><select id="map-floor"><option value="">全部樓層</option></select></div>
      </div>
      <div id="leafletMap"></div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#F5F5F5;border:1.5px solid #CCC"></div>0–50 品牌</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FFB8B3"></div>51–100</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FF7A72"></div>101–200</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FF3D2E"></div>201–300</div>
        <div class="legend-item"><div class="legend-dot" style="background:#CC0000"></div>300+</div>
      </div>
      <div class="kpi-row" style="display:grid;grid-template-columns:repeat(3,1fr);margin-top:10px">
        <div class="kpi-card"><div class="val" id="map-k1">0</div><div class="lbl">顯示據點</div></div>
        <div class="kpi-card"><div class="val" id="map-k2">0</div><div class="lbl">涵蓋品牌</div></div>
        <div class="kpi-card"><div class="val" id="map-k3">0</div><div class="lbl">平均品牌數</div></div>
      </div>
    </div>
  </div>
  <div class="section" id="sec-compare">
    <div class="section-label">Brand Coverage</div>
    <div class="section-title">品牌覆蓋度比較</div>
    <div class="panel" style="margin:0 32px 16px">
      <div class="ctrl-row">
        <div class="ctrl-group"><label>分店 A</label><select id="cp-a"><option value="">請選擇分店…</option></select></div>
        <div class="ctrl-group"><label>分店 B</label><select id="cp-b"><option value="">請選擇分店…</option></select></div>
      </div>
    </div>
    <div id="cp-kpis" style="display:none">
      <div class="kpi-row" style="display:grid;grid-template-columns:repeat(5,1fr)">
        <div class="kpi-card"><div class="val" id="cp-a-cnt" style="color:#2563EB">0</div><div class="lbl">A 品牌數</div></div>
        <div class="kpi-card"><div class="val" id="cp-b-cnt" style="color:#059669">0</div><div class="lbl">B 品牌數</div></div>
        <div class="kpi-card"><div class="val" id="cp-shared-cnt">0</div><div class="lbl">共同品牌</div></div>
        <div class="kpi-card"><div class="val" id="cp-oa-cnt" style="color:#D97706">0</div><div class="lbl">A 獨有</div></div>
        <div class="kpi-card"><div class="val" id="cp-ob-cnt" style="color:#7C3AED">0</div><div class="lbl">B 獨有</div></div>
      </div>
    </div>
    <div id="cp-results" style="display:none">
      <div class="grid-2" style="padding-bottom:0">
        <div class="panel" style="margin:0 0 16px 32px">
          <h3>韋恩圖（圓圈大小反映品牌數）</h3>
          <div class="venn-wrap" id="venn-svg"></div>
        </div>
        <div class="panel" style="margin:0 32px 16px 0">
          <h3>分類比較（<span style="color:#2563EB">■ A</span> / <span style="color:#059669">■ B</span>）</h3>
          <div id="cp-cat" class="scroll-box"></div>
        </div>
      </div>
      <div class="grid-3">
        <div class="panel" style="margin:0 0 16px 32px">
          <h3 style="border-left:3px solid #2563EB;padding-left:8px;color:#2563EB">僅在 A</h3>
          <div id="cp-list-a" class="scroll-box" style="margin-top:8px"></div>
        </div>
        <div class="panel" style="margin-bottom:16px">
          <h3 style="border-left:3px solid var(--black);padding-left:8px">共同品牌</h3>
          <div id="cp-list-shared" class="scroll-box" style="margin-top:8px"></div>
        </div>
        <div class="panel" style="margin:0 32px 16px 0">
          <h3 style="border-left:3px solid #059669;padding-left:8px;color:#059669">僅在 B</h3>
          <div id="cp-list-b" class="scroll-box" style="margin-top:8px"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="section" id="sec-competition">
    <div class="section-label">Competition Analysis</div>
    <div class="section-title">百貨競爭度分析</div>

// GOOGLE SHEETS CSV LOADER
// ══════════════════════════════════════════════════
// CSV 欄位（不分大小寫，共 5 欄）：
//   mall_name | store_name | brand_name | category | floor
//   百貨品牌   | 分店名稱   | 專櫃品牌   | 品牌分類  | 樓層
//
// ★ city 欄不需要填！程式會自動從分店名稱對應城市。
// Google Sheets → 檔案 → 共用 → 發布到網路 → CSV

async function loadFromSheets() {
  const rawUrl = document.getElementById('sheets-url').value.trim();
  if (!rawUrl) { alert('請先貼上 Google Sheets CSV 連結'); return; }

  // Convert edit/view URL to CSV export URL if needed
  let csvUrl = rawUrl;
  const m = rawUrl.match(/\/spreadsheets\/d\/([\w-]+)/);
  if (m) {
    // Extract gid if present
    const gidMatch = rawUrl.match(/[#&?]gid=(\d+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    csvUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`;
  }

  showLoading('從 Google Sheets 載入…');
  try {
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('無法解析 CSV');
    initData(rows);
    setDataStatus(true, `已載入 ${rows.length} 筆資料（Google Sheets）`);
  } catch(e) {
    setDataStatus(false, '載入失敗：' + e.message);
  } finally {
    hideLoading();
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').trim().replace(/^"|"$/g,''); });
    if (obj.brand_name || obj['品牌名稱'] || obj['brand']) {
      // Normalize column names
      const storeName = obj.store_name || obj['分店'] || obj['店名'] || '';
      rows.push({
        mall_name:  obj.mall_name  || obj['百貨品牌'] || obj['連鎖品牌'] || '',
        store_name: storeName,
        // city 自動從 STORE_CITY_MAP 查詢，CSV 不需要此欄
        city:       STORE_CITY_MAP[storeName] || obj.city || obj['城市'] || obj['縣市'] || '',
        brand_name: obj.brand_name || obj['品牌名稱'] || obj['品牌'] || '',
        category:   obj.category   || obj['分類']     || obj['品牌分類'] || '其他',
        floor:      obj.floor      || obj['樓層']     || ''
      });
    }
  }
  return rows;
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let c of line) {
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

    "包包鞋履": ['1F','2F','3F'],
    "男裝":     ['3F','4F','5F'],
    "女裝":     ['2F','3F','4F'],
    "兒童用品": ['5F','6F','7F'],
    "家居生活": ['6F','7F','8F'],
    "餐飲美食": ['B1','8F','9F','10F'],
    "服務門市": ['1F','B1','4F']
  };

  const records = [];
  const r = Math.random;

  const allMalls = [...new Set(STORE_COORDS.map(s => s.n))];
  allMalls.forEach(mall => {
    const city = STORE_CITY_MAP[mall] || '';
    let quota = 50;
    if (mall.includes('信義') || mall.includes('101') || mall.includes('南山')) quota = 80 + Math.floor(r()*20);
    else if (mall.includes('SOGO') || mall.includes('新光三越')) quota = 60 + Math.floor(r()*20);
    else if (mall.includes('遠東') || mall.includes('微風')) quota = 45 + Math.floor(r()*20);
    else quota = 25 + Math.floor(r()*25);

    const shuffled = [...BRANDS].sort(() => r() - .5).slice(0, Math.min(quota, BRANDS.length));
    shuffled.forEach(([cat, brand]) => {
      const floors = FLOOR_BY_CAT[cat] || FLOORS.slice(0,6);
      records.push({ mall_name: mall, store_name: mall, city, brand_name: brand, category: cat, floor: floors[Math.floor(r()*floors.length)] });
    });
  });
  return records;
}

function renderMap() {
  if (typeof L === 'undefined') {
    document.getElementById('leafletMap').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray-500);font-size:14px">地圖套件載入中，請稍候再切換至此頁…</div>';
    return;
  }
  if (!leafletMap) {
    leafletMap = L.map('leafletMap').setView([23.7,121],7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors', maxZoom:18
    }).addTo(leafletMap);
  }

  leafletMarkers.forEach(m => leafletMap.removeLayer(m));
  leafletMarkers = [];

  const selBrand = document.getElementById('map-brand').value;
  const selCity  = document.getElementById('map-city').value;
  const selFloor = document.getElementById('map-floor').value;

  let visible = 0, totalBrands = new Set(), totalMalls = 0;

  STORE_COORDS.forEach(store => {
    // Match by store_name first, then fall back to mall_name
    let rows = DATA.records.filter(r => r.store_name === store.n || r.mall_name === store.n);
    if (!rows.length) return;

    if (selBrand) rows = rows.filter(r => r.brand_name === selBrand);
    if (selFloor) rows = rows.filter(r => r.floor === selFloor);
    if (selCity && store.city !== selCity) return;

    const cnt = new Set(rows.map(r=>r.brand_name)).size;
    rows.forEach(r => totalBrands.add(r.brand_name));
    totalMalls++; visible++;

    let color = '#F5F5F5';          // 0-50 灰白
    if (cnt > 300)      color = '#CC0000';  // 深紅
    else if (cnt > 200) color = '#FF3D2E';  // 標準紅
    else if (cnt > 100) color = '#FF7A72';  // 中紅
    else if (cnt > 50)  color = '#FFB8B3';  // 淡紅

    const icon = L.divIcon({
      html: `<div style="background:${color};width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
      className:'', iconSize:[16,16], iconAnchor:[8,8]
    });

    const marker = L.marker([store.lat,store.lng],{icon})
      .bindPopup(`<b>${store.n}</b><br>
        <span style='color:#475569;font-size:12px'>${rows[0]?.mall_name||''} ‧ ${store.city}</span><br>
        品牌數：<b>${cnt}</b>　專櫃筆數：${rows.length}`)
      .addTo(leafletMap);
    leafletMarkers.push(marker);
  });

  const avg = totalMalls > 0 ? Math.round(totalBrands.size / totalMalls) : 0;
  document.getElementById('map-k1').textContent = totalMalls;
  document.getElementById('map-k2').textContent = totalBrands.size;
  document.getElementById('map-k3').textContent = avg;
}

function renderCompare() {
  const mallA = document.getElementById('cp-a').value;
  const mallB = document.getElementById('cp-b').value;
  if (!mallA || !mallB) {
    document.getElementById('cp-kpis').style.display = 'none';
    document.getElementById('cp-results').style.display = 'none';
    return;
  }

  const bA = new Set(DATA.records.filter(r=>r.store_name===mallA).map(r=>r.brand_name));
  const bB = new Set(DATA.records.filter(r=>r.store_name===mallB).map(r=>r.brand_name));
  const shared = new Set([...bA].filter(b=>bB.has(b)));
  const onlyA  = new Set([...bA].filter(b=>!bB.has(b)));
  const onlyB  = new Set([...bB].filter(b=>!bA.has(b)));

  document.getElementById('cp-a-cnt').textContent      = bA.size;
  document.getElementById('cp-b-cnt').textContent      = bB.size;
  document.getElementById('cp-shared-cnt').textContent = shared.size;
  document.getElementById('cp-oa-cnt').textContent     = onlyA.size;
  document.getElementById('cp-ob-cnt').textContent     = onlyB.size;

  document.getElementById('cp-kpis').style.display    = '';
  document.getElementById('cp-results').style.display = '';

  // Venn — dynamic circle sizes based on brand counts
  {
    const W = 340, H = 200, CY = 105;
    const maxR = 88, minR = 30;
    const maxCnt = Math.max(bA.size, bB.size, 1);
    const rA = Math.round(minR + (bA.size / maxCnt) * (maxR - minR));
    const rB = Math.round(minR + (bB.size / maxCnt) * (maxR - minR));
    // Overlap based on shared ratio
    const overlapRatio = bA.size > 0 ? shared.size / Math.min(bA.size, bB.size) : 0;
    const minDist = Math.abs(rA - rB) + 4;
    const maxDist = rA + rB - 8;
    const dist = Math.round(maxDist - overlapRatio * (maxDist - minDist));
    const cx = W / 2;
    const cxA = Math.round(cx - dist / 2);
    const cxB = Math.round(cx + dist / 2);
    // Label positions
    const labAx = Math.round(cxA - rA * 0.55);
    const labBx = Math.round(cxB + rB * 0.55);
    const midX  = Math.round((cxA + cxB) / 2);
    document.getElementById('venn-svg').innerHTML = `
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        <circle cx="${cxA}" cy="${CY}" r="${rA}" fill="rgba(37,99,235,.15)" stroke="#2563EB" stroke-width="2"/>
        <circle cx="${cxB}" cy="${CY}" r="${rB}" fill="rgba(5,150,105,.15)" stroke="#059669" stroke-width="2"/>
        <text x="${labAx}" y="${CY + 6}" text-anchor="middle" font-size="24" font-weight="800" fill="#2563EB" font-family="DM Mono,monospace">${onlyA.size}</text>
        <text x="${midX}"  y="${CY + 6}" text-anchor="middle" font-size="18" font-weight="800" fill="#333" font-family="DM Mono,monospace">${shared.size}</text>
        <text x="${labBx}" y="${CY + 6}" text-anchor="middle" font-size="24" font-weight="800" fill="#059669" font-family="DM Mono,monospace">${onlyB.size}</text>
        <text x="${cxA}" y="18" text-anchor="middle" font-size="10" fill="#2563EB" font-weight="700">${esc(mallA.length>12?mallA.substring(0,11)+'…':mallA)}</text>
        <text x="${cxB}" y="18" text-anchor="middle" font-size="10" fill="#059669" font-weight="700">${esc(mallB.length>12?mallB.substring(0,11)+'…':mallB)}</text>
        <text x="${labAx}" y="${CY + 22}" text-anchor="middle" font-size="9" fill="#666">獨有</text>
        <text x="${midX}"  y="${CY + 22}" text-anchor="middle" font-size="9" fill="#666">共同</text>
        <text x="${labBx}" y="${CY + 22}" text-anchor="middle" font-size="9" fill="#666">獨有</text>
      </svg>`;
  }

  // Category comparison
  const catRows = DATA.categories.map(cat => {
    const cntA = new Set(DATA.records.filter(r=>r.store_name===mallA&&r.category===cat).map(r=>r.brand_name)).size;
    const cntB = new Set(DATA.records.filter(r=>r.store_name===mallB&&r.category===cat).map(r=>r.brand_name)).size;
    return { cat, cntA, cntB };
  });
  const maxCat = Math.max(...catRows.map(r=>Math.max(r.cntA,r.cntB)),1);
  document.getElementById('cp-cat').innerHTML = catRows.map(({cat,cntA,cntB}) => `
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
        <span>${esc(cat)}</span><span style="color:var(--gray-700)">A:${cntA} / B:${cntB}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
        <div class="bar-track"><div class="bar-fill" style="width:${cntA/maxCat*100}%;background:#2563EB"></div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${cntB/maxCat*100}%;background:#059669"></div></div>
      </div>
    </div>`).join('');

  // Tag lists
  document.getElementById('cp-list-a').innerHTML      = [...onlyA].sort().map(b=>`<span class="tag tag-a">${esc(b)}</span>`).join('');
  document.getElementById('cp-list-shared').innerHTML = [...shared].sort().map(b=>`<span class="tag tag-shared">${esc(b)}</span>`).join('');
  document.getElementById('cp-list-b').innerHTML      = [...onlyB].sort().map(b=>`<span class="tag tag-b">${esc(b)}</span>`).join('');
}

function updateCompFilter() {
  const dim = document.getElementById('comp-dim').value;
  const labels = {city:'選擇城市',mallname:'選擇百貨品牌',category:'選擇品牌分類',brand:'選擇品牌'};
  document.getElementById('comp-filter-lbl').textContent = labels[dim]||'選擇…';

function renderComp() {
  const dim    = document.getElementById('comp-dim').value;
  const filter = document.getElementById('comp-filter').value;
  const topN   = parseInt(document.getElementById('comp-topn').value);
  if (!filter) {
    document.getElementById('comp-kpis').style.display    = 'none';
    document.getElementById('comp-results').style.display = 'none';
    return;
  }

  let rows = DATA.records;
  if (dim === 'city')     rows = rows.filter(r => r.city === filter);
  if (dim === 'mallname') rows = rows.filter(r => r.mall_name === filter);
  if (dim === 'category') rows = rows.filter(r => r.category === filter);
  if (dim === 'brand')    rows = rows.filter(r => r.brand_name === filter);

  // Group by store_name for competition ranking
  const mallCnt = {};
  rows.forEach(r => { (mallCnt[r.store_name] = mallCnt[r.store_name]||new Set()).add(r.brand_name); });
  const sorted = Object.entries(mallCnt).map(([m,s])=>({m,cnt:s.size})).sort((a,b)=>b.cnt-a.cnt);

  document.getElementById('comp-k1').textContent = sorted.length;
  document.getElementById('comp-k2').textContent = new Set(rows.map(r=>r.brand_name)).size;
  document.getElementById('comp-k3').textContent = sorted[0]?.m.substring(0,12)||'—';

  document.getElementById('comp-kpis').style.display    = '';
  document.getElementById('comp-results').style.display = '';

  // Ranking bars
  const top = sorted.slice(0, topN);
  const maxV = top[0]?.cnt || 1;
  document.getElementById('comp-rank').innerHTML = top.map(({m,cnt},i) => `
    <div class="rank-row">
      <span class="rank-num">#${i+1}</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${esc(m)}</span>
          <span style="font-family:var(--font-mono);color:var(--red);font-weight:600">${cnt}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${cnt/maxV*100}%"></div></div>
      </div>
    </div>`).join('');

  // Competition heatmap (malls × categories)
  const topStores = top.map(x=>x.m);
  const cats = DATA.categories;
  const hmMatrix = {};
  topStores.forEach(s => {
    hmMatrix[s] = {};
    cats.forEach(c => {
      hmMatrix[s][c] = new Set(rows.filter(r=>r.store_name===s&&r.category===c).map(r=>r.brand_name)).size;
    });
  });
  const mat2 = {};
  topStores.forEach(s => { mat2[s] = hmMatrix[s]; });
  renderHeatTable('comp-hm', topStores, cats, mat2, false, s => s.length>12 ? s.substring(0,11)+'…' : s);
}

function renderBars(elId, dataObj) {

    <div class="bar-row">

function renderHeatTable(elId, rows, cols, matrix, tooltip=false, rowLabel=null) {
  if (!rows.length || !cols.length) {
    document.getElementById(elId).innerHTML = '<div class="empty-state">尚無資料</div>';
    return;
  }
  let maxV = 0;
  rows.forEach(r => cols.forEach(c => { maxV = Math.max(maxV, matrix[r]?.[c]||0); }));

  const th = (t) => `<th style="max-width:80px;overflow:hidden;text-overflow:ellipsis" title="${esc(t)}">${esc(t.length>8?t.substring(0,7)+'…':t)}</th>`;

  const html = `
    <table class="hm-table">
      <thead><tr><th>↓行/列→</th>${cols.map(th).join('')}</tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td style="font-weight:600;white-space:nowrap;background:#F0EBE3;color:var(--black)">${esc(rowLabel ? rowLabel(r) : r)}</td>
          ${cols.map(c => {
            const v = matrix[r]?.[c]||0;
            const i = maxV > 0 ? Math.min(Math.floor(v/maxV*5),5) : 0;
            return `<td class="hi${i}" ${tooltip?`title="${esc(r)} × ${esc(c)}: ${v}"`:''} >${v||''}</td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>`;
  document.getElementById(elId).innerHTML = html;
}

async function loadNewsFromRSS() {
  const keyword  = document.getElementById('news-keyword').value.trim() || '台灣 百貨 零售';
  const lang     = document.getElementById('news-lang').value;
  const statusEl = document.getElementById('news-status');
  const gridEl   = document.getElementById('news-grid');

  statusEl.textContent = 'RSS 抓取中…';
  gridEl.innerHTML = '<div class="empty-state" style="grid-column:1/-1">RSS 載入中，請稍候…</div>';

  const timerange = document.getElementById('news-timerange').value;
  const hl   = lang;
  const gl   = lang === 'zh-TW' ? 'TW' : lang === 'zh-CN' ? 'CN' : 'US';
  const ceid = lang === 'zh-TW' ? 'TW:zh-Hant' : lang === 'zh-CN' ? 'CN:zh-Hans' : 'US:en';
  const q    = encodeURIComponent(keyword + ' when:' + timerange);
  const rssUrl = `https://news.google.com/rss/search?q=${q}&hl=${hl}&gl=${gl}&ceid=${ceid}`;

  let items = null;
  let lastError = '';
  let usedProxy = '';

  for (const proxy of NEWS_PROXIES) {
    statusEl.textContent = `RSS 嘗試 ${proxy.name}…`;
    try {
      const url  = proxy.buildUrl(rssUrl);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      let resp;
      try {
        resp = await fetch(url, { signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      if (proxy.type === 'json') {
        const data = await resp.json();
        if (data.status !== 'ok') throw new Error(data.message || '解析失敗');
        items = (data.items || []).map(i => ({
          title:   i.title   || '',
          desc:    (i.description || '').replace(/<[^>]*>/g,'').trim(),
          link:    i.link    || '#',
          source:  i.source  || i.author || '',
          pubDate: i.pubDate || '',
          img:     i.enclosure?.link || i.thumbnail || ''
        }));
      } else {
        let xmlText = '';
        if (proxy.type === 'xml-wrapped') {
          const json = await resp.json();
          xmlText = json.contents || '';
        } else {
          xmlText = await resp.text();
        }
        items = parseRssXml(xmlText);
      }

      if (items && items.length > 0) { usedProxy = proxy.name; break; }
      throw new Error('解析結果為空');
    } catch(e) {
      lastError = `${proxy.name}: ${e.message}`;
      items = null;
    }
  }

  if (!items || !items.length) {
    gridEl.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div style="font-size:28px;margin-bottom:10px">📡</div>
        <div style="font-weight:600;margin-bottom:6px">RSS 暫時無法載入</div>
        <div style="font-size:11px;color:var(--gray-500);font-family:var(--font-mono);
          background:var(--gray-100);padding:8px 12px;border-radius:6px;
          max-width:400px;margin:8px auto 12px">${esc(lastError)}</div>
        <button class="btn btn-primary" onclick="loadNewsFromRSS()">🔄 重試</button>
      </div>`;
    statusEl.textContent = '';
    return;
  }

  renderNewsCards(items, false);
  newsLoaded = true;
  const now = new Date().toLocaleString('zh-TW');
  statusEl.innerHTML = `
    <span style="color:var(--gray-700)">RSS (${usedProxy})</span>
    　共 ${items.length} 則　· 更新於 ${now}`;
}

// ──────────────────────────────────────────────────
// 用瀏覽器內建 DOMParser 解析 RSS XML
// ──────────────────────────────────────────────────
function parseRssXml(xmlText) {
  try {
    const parser  = new DOMParser();
    const doc     = parser.parseFromString(xmlText, 'text/xml');
    const entries = doc.querySelectorAll('item');
    if (!entries.length) return [];
    const stripHtml = s => (s || '').replace(/<[^>]*>/g, '').trim();
    return Array.from(entries).map(el => {
      const get = tag => el.querySelector(tag)?.textContent || '';
      return {
        title:   stripHtml(get('title')),
        link:    get('link') || el.querySelector('guid')?.textContent || '#',
        desc:    stripHtml(get('description')),
        pubDate: get('pubDate'),
        source:  el.querySelector('source')?.textContent || '',
        img:     el.querySelector('media\:content')?.getAttribute('url') ||
                 el.querySelector('enclosure')?.getAttribute('url') || ''
      };
    });
  } catch(e) { return []; }
}

// ──────────────────────────────────────────────────
// 渲染新聞卡片
// isGCS=true：顯示 Gemini 產生的 category/region/impact badge
// ──────────────────────────────────────────────────
function renderNewsCards(items, isGCS = false) {
  const gridEl = document.getElementById('news-grid');
  const impactStyle = {
    high:   'background:#FDECEA;color:#B03A2E;border:1px solid #F5B7B1',
    medium: 'background:#FEF9E7;color:#9A6700;border:1px solid #FAD77B',
    low:    'background:#EAFAF1;color:#1E8449;border:1px solid #A9DFBF'
  };
  const impactLabel = { high:'高影響', medium:'中影響', low:'低影響' };

  gridEl.innerHTML = items.map(item => {
    const link     = item.link || '#';
    const safeLink = link.replace(/'/g, '%27');
    const pubDate  = item.pubDate
      ? new Date(item.pubDate).toLocaleDateString('zh-TW',
          { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
      : '';
    const impact = item.impact || 'medium';

    const gcsBadges = isGCS ? `
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
        ${item.category ? `<span style="background:var(--red-pale);color:var(--red);
          border:1px solid #DDB8A8;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600">
          ${esc(item.category)}</span>` : ''}
        ${item.region ? `<span style="background:#E8EEF8;color:var(--black);
          border:1px solid #C5D2EA;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600">
          ${esc(item.region)}</span>` : ''}
        <span style="${impactStyle[impact] || impactStyle.medium};
          padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">
          ${impactLabel[impact] || '中影響'}</span>
      </div>` : '';

    return `
      <div class="news-card" onclick="window.open('${safeLink}','_blank')">
        <div class="news-card-img">
          ${item.img
            ? `<img src="${esc(item.img)}" alt="" loading="lazy"
                onerror="this.parentNode.innerHTML='<span style=font-size:32px>📰</span>'">`
            : '<span style="font-size:32px">📰</span>'}
        </div>
        <div class="news-card-body">
          ${gcsBadges}
          ${item.source ? `<div class="news-card-source">${esc(item.source)}</div>` : ''}
          <div class="news-card-title">${esc(item.title)}</div>
          ${item.desc ? `<div class="news-card-desc">${esc(item.desc)}</div>` : ''}
          <div class="news-card-footer">
            <span>${pubDate}</span>
            ${link !== '#'
              ? `<a href="${link}" target="_blank" onclick="event.stopPropagation()">閱讀全文 →</a>`
              : '<span style="color:var(--gray-500)">Gemini 摘要</span>'}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function loadReports() {
  const rawUrl = document.getElementById('report-sheets-url').value.trim();
  if (!rawUrl) { alert('請先貼上報告 Google Sheets CSV 連結'); return; }

  let csvUrl = rawUrl;
  const m = rawUrl.match(/\/spreadsheets\/d\//);
  const m2 = rawUrl.match(/\/spreadsheets\/d\/([\w-]+)/);
  if (m2) {
    const gidMatch = rawUrl.match(/[#&?]gid=(\d+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    csvUrl = `https://docs.google.com/spreadsheets/d/${m2[1]}/export?format=csv&gid=${gid}`;
  }

  setReportStatus(false, '載入中…');
  try {
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    REPORTS = parseReportCSV(text);
    if (!REPORTS.length) throw new Error('無法解析 CSV，請確認欄位名稱');
    setReportStatus(true, `已載入 ${REPORTS.length} 份報告`);
    renderReportList();
  } catch(e) {
    setReportStatus(false, '載入失敗：' + e.message);
  }
}

function parseReportCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx]||'').trim().replace(/^"|"$/g,''); });
    if (obj.title || obj['標題']) {
      rows.push({
        period_type:  obj.period_type  || obj['期別類型'] || 'week',
        period_label: obj.period_label || obj['期別標籤'] || '',
        title:        obj.title        || obj['標題']     || '',
        summary:      obj.summary      || obj['摘要']     || '',
        content:      obj.content      || obj['內文']     || '',
        risk_level:   obj.risk_level   || obj['風險等級'] || 'mid',
        tags:         obj.tags         || obj['標籤']     || ''
      });
    }
  }
  return rows;
}

function renderReportList() {
  const listEl = document.getElementById('report-list');
  if (!REPORTS.length) {
    listEl.innerHTML = '<div class="empty-state">請貼上 Google Sheets CSV 連結並載入報告</div>';
    document.getElementById('rpt-count').textContent = '';
    return;
  }

  const filtered = REPORTS.filter(r => r.period_type === currentReportTab);
  document.getElementById('rpt-count').textContent = `共 ${filtered.length} 份`;

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty-state">此期別暫無報告</div>';
    return;
  }

  // Sort by period_label descending (newest first)
  const sorted = [...filtered].sort((a,b) => b.period_label.localeCompare(a.period_label));

  listEl.innerHTML = sorted.map((rpt, idx) => {
    const riskLabel = {high:'高風險',mid:'中風險',low:'低風險'}[rpt.risk_level] || '中風險';
    const riskClass = {high:'risk-high',mid:'risk-mid',low:'risk-low'}[rpt.risk_level] || 'risk-mid';
    const tags = rpt.tags ? rpt.tags.split(',').map(t => t.trim()).filter(Boolean) : [];

    // Format content: lines starting with ## become <h4>
    const formattedContent = esc(rpt.content)
      .split('\n')
      .map(line => {
        if (line.startsWith('## ')) return `<h4>${line.slice(3)}</h4>`;
        if (line === '') return '<div class="report-divider"></div>';
        return line;
      })
      .join('\n');

    return `
      <div class="report-card">
        <div class="report-card-header" onclick="toggleReport(${idx})">
          <span class="report-period-badge">${esc(rpt.period_label)}</span>
          <div class="report-card-meta">
            <div class="report-card-title">${esc(rpt.title)}</div>
            <div class="report-card-summary">${esc(rpt.summary)}</div>
            ${tags.length ? `<div class="report-card-tags">${tags.map(t=>`<span class="report-tag">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
          <span class="risk-badge ${riskClass}">${riskLabel}</span>
          <span class="report-toggle" id="toggle-icon-${idx}">＋</span>
        </div>
        <div class="report-card-body" id="report-body-${idx}">
          <div class="report-body-content">${formattedContent}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleReport(idx) {
  const body = document.getElementById(`report-body-${idx}`);
  const icon = document.getElementById(`toggle-icon-${idx}`);
  const isOpen = body.classList.toggle('open');
  icon.textContent = isOpen ? '－' : '＋';
}

function setReportStatus(ok, msg) {
  const dot = document.getElementById('rpt-dot');
  dot.className = 'dot ' + (ok ? 'ok' : 'err');
  document.getElementById('rpt-status').textContent = msg;
}
