<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百貨專櫃分析 — 儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════
     深藍 + 磚紅 顧問風格設計系統
     色調：莊重、專業、有溫度的商業分析工具
  ══════════════════════════════════════════════ */

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Design Tokens ── */
  :root {
    /* 主色調 */
    --primary:      #0F2B63;   /* 深藍 */
    --primary-dark: #091C45;   /* 更深藍（hover） */
    --primary-mid:  #1A3A7A;   /* 中深藍（次要底色） */
    --accent:       #A2543B;   /* 磚紅 */
    --accent-light: #C4715A;   /* 磚紅淺版（hover） */
    --accent-pale:  #F5EDE9;   /* 磚紅極淡（tag背景） */

    /* 中性色 */
    --bg:           #F5F0EA;   /* 米色背景 */
    --card:         #FFFFFF;   /* 白卡片 */
    --border:       #DDD7CE;   /* 米色系邊框 */
    --border-light: #EDE8E0;   /* 極淡邊框 */
    --text-primary: #1A1A2E;   /* 主要文字 */
    --text-secondary:#5C5C72;  /* 次要文字 */
    --text-muted:   #9B96A3;   /* 提示文字 */

    /* 功能色 */
    --success:      #2D7D52;
    --error:        #B03A2E;
    --info:         #1A5276;

    /* 排版 */
    --font-body: 'Noto Sans TC', '微軟正黑體', 'Microsoft JhengHei', 'Heiti TC', sans-serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;

    /* 間距與圓角 */
    --radius-sm: 0px;
    --radius:    0px;
    --radius-lg: 0px;

    /* 陰影 */
    --shadow-sm: 0 1px 4px rgba(15,43,99,.08);
    --shadow:    0 2px 12px rgba(15,43,99,.10);
    --shadow-md: 0 4px 20px rgba(15,43,99,.13);
  }

  /* ── Base ── */
  html, body {
    font-family: var(--font-body);
    font-size: 16px;           /* 內文 16px */
    line-height: 1.6;
    background: var(--bg);
    color: var(--text-primary);
    width: 100%;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Typography ── */
  h1 { font-size: 36px; font-weight: 700; line-height: 1.2; }
  h2 { font-size: 24px; font-weight: 600; line-height: 1.3; }
  h3 { font-size: 20px; font-weight: 500; line-height: 1.4; }

  /* ── App Root ── */
  #app-root {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  #app-header {
    background: var(--primary);
    color: #FFFFFF;
    padding: 0 24px;
    flex-shrink: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
    box-shadow: 0 2px 16px rgba(15,43,99,.30);
  }

  /* ── Tab Bar ── */
  #tab-bar {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding-top: 6px;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    white-space: nowrap;
    padding: 10px 18px;
    font-size: 14px;
    font-family: var(--font-body);
    font-weight: 500;
    background: transparent;
    color: rgba(255,255,255,.55);
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: color .18s, border-color .18s, background .18s;
    letter-spacing: .02em;
    margin-bottom: -3px;        /* 蓋住 header border-bottom */
  }
  .tab-btn:hover {
    color: rgba(255,255,255,.90);
    background: rgba(255,255,255,.06);
  }
  .tab-btn.active {
    color: #FFFFFF;
    border-bottom-color: var(--accent);
    background: rgba(255,255,255,.05);
    font-weight: 700;
  }

  /* ── Content Shell ── */
  #content-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    background: var(--bg);
  }
  #content-area::-webkit-scrollbar { width: 5px; }
  #content-area::-webkit-scrollbar-track { background: transparent; }
  #content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .section { display: none; }
  .section.active { display: block; }

  /* ── Loading Overlay ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(245,240,234,.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
  }

  /* ── Data Source Banner ── */
  #data-banner {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary-mid);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    box-shadow: var(--shadow-sm);
  }
  #data-banner .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  #data-banner .dot.ok  { background: var(--success); }
  #data-banner .dot.err { background: var(--error); }
  #data-banner input {
    flex: 1; min-width: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-primary);
    background: var(--bg);
    transition: border-color .15s;
  }
  #data-banner input:focus {
    outline: none;
    border-color: var(--primary);
  }
  #data-banner button {
    padding: 6px 14px;
    background: var(--primary);
    color: #FFFFFF;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 500;
    white-space: nowrap;
    transition: background .15s;
  }
  #data-banner button:hover { background: var(--primary-dark); }
  #data-banner .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  #data-banner .btn-ghost:hover {
    background: var(--bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── KPI Cards ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-left: 4px solid var(--accent);   /* 磚紅左邊線 */
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s, transform .2s;
  }
  .kpi-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .kpi-card .val {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    font-family: var(--font-mono);
    letter-spacing: -.02em;
    line-height: 1.1;
  }
  .kpi-card .lbl {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: .01em;
  }

  /* ── Section Title ── */
  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    display: block;
    width: 4px;
    height: 22px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Panel ── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .panel h3 {
    font-size: 16px;            /* H3: 16px（panel 內縮一級） */
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel h3::after {
    content: '';
    display: block;
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border-light), transparent);
  }

  /* ── Grid helpers ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 680px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  /* ── Form Controls ── */
  .ctrl-row {
    display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
  }
  .ctrl-group {
    display: flex; flex-direction: column; gap: 5px;
    min-width: 140px; flex: 1;
  }
  .ctrl-group label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .ctrl-group select,
  .ctrl-group input[type="text"] {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: var(--font-body);
    background: var(--card);
    color: var(--text-primary);
    transition: border-color .15s, box-shadow .15s;
  }
  .ctrl-group select:hover,
  .ctrl-group input:hover { border-color: var(--primary-mid); }
  .ctrl-group select:focus,
  .ctrl-group input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(15,43,99,.10);
  }

  /* ── Buttons ── */
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, transform .1s, box-shadow .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary {
    background: var(--primary);
    color: #FFFFFF;
    box-shadow: 0 2px 6px rgba(15,43,99,.25);
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-pale);
  }

  /* ── Bar Chart ── */
  .bar-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .bar-row .name {
    width: 136px; font-size: 13px;
    color: var(--text-primary);
    flex-shrink: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .bar-track {
    flex: 1; height: 10px;
    background: var(--border-light);
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 5px;
    background: linear-gradient(to right, var(--primary), var(--primary-mid));
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .bar-val {
    width: 38px; text-align: right;
    font-size: 13px;
    font-family: var(--font-mono);
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Heatmap ── */
  .hm-wrap { overflow-x: auto; }
  .hm-table { border-collapse: collapse; font-size: 12px; width: 100%; }
  .hm-table th {
    background: var(--primary);
    color: rgba(255,255,255,.90);
    padding: 7px 8px;
    text-align: center;
    white-space: nowrap;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: .02em;
  }
  .hm-table th:first-child {
    background: var(--primary-dark);
    text-align: left;
  }
  .hm-table td {
    padding: 5px 6px;
    text-align: center;
    border: 1px solid var(--border-light);
    font-size: 12px;
    transition: background .1s;
  }
  .hm-table td:first-child {
    font-weight: 600;
    font-size: 12px;
    background: #F0EBE3;
    color: var(--primary);
    text-align: left;
    white-space: nowrap;
    padding-left: 10px;
  }
  /* 磚紅色系漸層熱力 */
  .hi0 { background: #FAF7F4; color: var(--text-muted); }
  .hi1 { background: #F5EDE9; color: var(--accent); }
  .hi2 { background: #E8C5B8; color: #7A3020; }
  .hi3 { background: #C9866E; color: #FFFFFF; }
  .hi4 { background: #A2543B; color: #FFFFFF; font-weight: 600; }
  .hi5 { background: var(--primary); color: #FFFFFF; font-weight: 700; }

  /* ── Search Results ── */
  .result-brand {
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .result-brand-header {
    background: var(--primary);
    color: #FFFFFF;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-brand-header::before {
    content: '';
    display: block;
    width: 3px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .result-location {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
    font-size: 14px;
    transition: background .12s;
  }
  .result-location:hover { background: #FAF7F4; }
  .result-location:last-child { border-bottom: none; }
  .floor-badge {
    background: var(--accent);
    color: #FFFFFF;
    font-family: var(--font-mono);
    padding: 3px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .04em;
  }

  /* ── Venn ── */
  .venn-wrap { display: flex; justify-content: center; align-items: center; padding: 8px 0; }
  .venn-wrap svg text { font-family: var(--font-mono); }

  /* ── Tags ── */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .01em;
  }
  .tag-a      { background: #E8EEF8; color: var(--primary); border: 1px solid #C5D2EA; }
  .tag-b      { background: #E8F5EE; color: #1A5C35; border: 1px solid #B8DECA; }
  .tag-shared { background: var(--accent-pale); color: var(--accent); border: 1px solid #DDB8A8; }

  /* ── Map ── */
  #leafletMap { height: 420px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .map-legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--card);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-light);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.12); }

  /* ── Rank rows ── */
  .rank-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .rank-num {
    width: 28px;
    font-size: 13px; font-weight: 700;
    color: var(--accent);
    font-family: var(--font-mono);
    text-align: center;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty-state::before {
    content: '—';
    display: block;
    font-size: 28px;
    margin-bottom: 8px;
    color: var(--border);
  }

  /* ── Scroll boxes ── */
  .scroll-box { max-height: 260px; overflow-y: auto; }
  .scroll-box::-webkit-scrollbar { width: 4px; }
  .scroll-box::-webkit-scrollbar-track { background: var(--border-light); border-radius: 2px; }
  .scroll-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── News Cards ── */
  .news-card {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s, transform .2s;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }
  .news-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .news-card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: linear-gradient(135deg, #E8EEF8 0%, #EDE8E0 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-size: 28px;
    flex-shrink: 0;
  }
  .news-card-img img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .news-card-body {
    padding: 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .news-card-source {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .news-card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .news-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-light);
    font-size: 11px;
    color: var(--text-muted);
  }
  .news-card-footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    font-size: 12px;
  }
  .news-card-footer a:hover { color: var(--accent); }

  /* ── Report Tab Buttons ── */
  .rpt-tab-btn {
    padding: 7px 20px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .rpt-tab-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }
  .rpt-tab-active {
    background: var(--primary);
    border-color: var(--primary);
    color: #FFFFFF !important;
  }

  /* ── Report Cards ── */
  .report-card {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .report-card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .report-card-header:hover { background: #FAF7F4; }
  .report-period-badge {
    background: var(--primary);
    color: #FFFFFF;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .report-card-meta {
    flex: 1;
    min-width: 0;
  }
  .report-card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .report-card-summary {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .report-card-tags {

// GOOGLE SHEETS CSV LOADER
// ══════════════════════════════════════════════════
// CSV 欄位（不分大小寫，共 5 欄）：
//   mall_name | store_name | brand_name | category | floor
//   百貨品牌   | 分店名稱   | 專櫃品牌   | 品牌分類  | 樓層
//
// ★ city 欄不需要填！程式會自動從分店名稱對應城市。
// Google Sheets → 檔案 → 共用 → 發布到網路 → CSV

async function loadFromSheets() {
  const rawUrl = document.getElementById('sheets-url').value.trim();
  if (!rawUrl) { alert('請先貼上 Google Sheets CSV 連結'); return; }

  // Convert edit/view URL to CSV export URL if needed
  let csvUrl = rawUrl;
  const m = rawUrl.match(/\/spreadsheets\/d\/([\w-]+)/);
  if (m) {
    // Extract gid if present
    const gidMatch = rawUrl.match(/[#&?]gid=(\d+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    csvUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`;
  }

  showLoading('從 Google Sheets 載入…');
  try {
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('無法解析 CSV');
    initData(rows);
    setDataStatus(true, `已載入 ${rows.length} 筆資料（Google Sheets）`);
  } catch(e) {
    setDataStatus(false, '載入失敗：' + e.message);
  } finally {
    hideLoading();
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').trim().replace(/^"|"$/g,''); });
    if (obj.brand_name || obj['品牌名稱'] || obj['brand']) {
      // Normalize column names
      const storeName = obj.store_name || obj['分店'] || obj['店名'] || '';
      rows.push({
        mall_name:  obj.mall_name  || obj['百貨品牌'] || obj['連鎖品牌'] || '',
        store_name: storeName,
        // city 自動從 STORE_CITY_MAP 查詢，CSV 不需要此欄
        city:       STORE_CITY_MAP[storeName] || obj.city || obj['城市'] || obj['縣市'] || '',
        brand_name: obj.brand_name || obj['品牌名稱'] || obj['品牌'] || '',
        category:   obj.category   || obj['分類']     || obj['品牌分類'] || '其他',
        floor:      obj.floor      || obj['樓層']     || ''
      });
    }
  }
  return rows;
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let c of line) {
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function renderSearch() {
  const q      = document.getElementById('s-brand').value.trim().toLowerCase();
  const city     = document.getElementById('s-city').value;
  const mallname = document.getElementById('s-mallname').value;
  const store    = document.getElementById('s-store').value;
  const cat      = document.getElementById('s-cat').value;
  const floor    = document.getElementById('s-floor').value;
  let rows = DATA.records;
  if (q)        rows = rows.filter(r => r.brand_name.toLowerCase().includes(q));

  if (mallname) rows = rows.filter(r => r.mall_name === mallname);
  if (store)    rows = rows.filter(r => r.store_name === store);
  if (cat)      rows = rows.filter(r => r.category === cat);
  if (floor)    rows = rows.filter(r => r.floor === floor);

  document.getElementById('s-count').textContent = `共 ${rows.length} 筆`;

  if (!rows.length) {
    document.getElementById('search-results').innerHTML = '<div class="empty-state">找不到符合結果</div>';

  const grouped = {};
  rows.forEach(r => { (grouped[r.brand_name] = grouped[r.brand_name]||[]).push(r); });

  document.getElementById('search-results').innerHTML = Object.entries(grouped).map(([brand, locs]) => `
    <div class="result-brand">

        <span style="font-size:11px;font-weight:400;margin-left:8px;opacity:.7">${locs[0].category}</span>
      </div>

        <div class="result-location">

          </div>

}

function clearSearch() {

    const el = document.getElementById(id);

// ══════════════════════════════════════════════════

function renderHeatmap() {
  const q   = document.getElementById('hm-brand').value.trim().toLowerCase();
  const cat = document.getElementById('hm-cat').value;
  const dim = document.getElementById('hm-dim').value;

  let rows = DATA.records;
  if (q)   rows = rows.filter(r => r.brand_name.toLowerCase().includes(q));
  if (cat) rows = rows.filter(r => r.category === cat);

  const cols = dim === 'city' ? DATA.cities : dim === 'mallname' ? DATA.mallNames : DATA.stores;
  const getKey = dim === 'city' ? r => r.city : dim === 'mallname' ? r => r.mall_name : r => r.store_name;
  const matrix = {};
  FLOORS.forEach(f => {
    matrix[f] = {};
    cols.forEach(c => {
      matrix[f][c] = rows.filter(r => r.floor===f && getKey(r)===c).length;
    });
  });

  renderHeatTable('hm-table', FLOORS, cols, matrix, true);
}

// MATRIX
// ══════════════════════════════════════════════════

function renderMatrix() {
  const mallName = document.getElementById('mx-mallname').value;
  const store    = document.getElementById('mx-store').value;
  const type     = document.getElementById('mx-type').value;
  if (!mallName && !store) return;

  let rows = DATA.records;
  if (mallName) rows = rows.filter(r => r.mall_name === mallName);
  if (store)    rows = rows.filter(r => r.store_name === store);
  let cols;
  if (type === 'category') {
    cols = DATA.categories;
  } else {
    const cnt = {};
    rows.forEach(r => { cnt[r.brand_name] = (cnt[r.brand_name]||0)+1; });
    cols = Object.entries(cnt).sort(([,a],[,b])=>b-a).slice(0,10).map(([k])=>k);
  }

  const matrix = {};
  FLOORS.forEach(f => {
    matrix[f] = {};
    cols.forEach(c => {
      matrix[f][c] = rows.filter(r => r.floor===f && (type==='category'?r.category:r.brand_name)===c).length;
    });
  });

  // Only show floors with data
  const activeFloors = FLOORS.filter(f => Object.values(matrix[f]).some(v => v > 0));
  renderHeatTable('mx-table', activeFloors, cols, matrix);
}

// SHARED RENDER HELPERS
// ══════════════════════════════════════════════════

function renderBars(elId, dataObj) {
  const max = Math.max(...Object.values(dataObj), 1);
  document.getElementById(elId).innerHTML = Object.entries(dataObj).map(([name, val]) => `
    <div class="bar-row">
      <span class="name" title="${esc(name)}">${esc(name)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${val/max*100}%"></div></div>
      <span class="bar-val">${val}</span>
    </div>`).join('');
}

function renderHeatTable(elId, rows, cols, matrix, tooltip=false, rowLabel=null) {
  if (!rows.length || !cols.length) {
    document.getElementById(elId).innerHTML = '<div class="empty-state">尚無資料</div>';
    return;
  }
  let maxV = 0;
  rows.forEach(r => cols.forEach(c => { maxV = Math.max(maxV, matrix[r]?.[c]||0); }));

  const th = (t) => `<th style="max-width:80px;overflow:hidden;text-overflow:ellipsis" title="${esc(t)}">${esc(t.length>8?t.substring(0,7)+'…':t)}</th>`;

  const html = `
    <table class="hm-table">
      <thead><tr><th>↓行/列→</th>${cols.map(th).join('')}</tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td style="font-weight:600;white-space:nowrap;background:#F0EBE3;color:var(--primary)">${esc(rowLabel ? rowLabel(r) : r)}</td>
          ${cols.map(c => {
            const v = matrix[r]?.[c]||0;
            const i = maxV > 0 ? Math.min(Math.floor(v/maxV*5),5) : 0;
            return `<td class="hi${i}" ${tooltip?`title="${esc(r)} × ${esc(c)}: ${v}"`:''} >${v||''}</td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>`;
  document.getElementById(elId).innerHTML = html;
}

async function loadNewsFromRSS() {
  const keyword  = document.getElementById('news-keyword').value.trim() || '台灣 百貨 零售';
  const lang     = document.getElementById('news-lang').value;
  const statusEl = document.getElementById('news-status');
  const gridEl   = document.getElementById('news-grid');

  statusEl.textContent = 'RSS 抓取中…';
  gridEl.innerHTML = '<div class="empty-state" style="grid-column:1/-1">RSS 載入中，請稍候…</div>';

  const timerange = document.getElementById('news-timerange').value;
  const hl   = lang;
  const gl   = lang === 'zh-TW' ? 'TW' : lang === 'zh-CN' ? 'CN' : 'US';
  const ceid = lang === 'zh-TW' ? 'TW:zh-Hant' : lang === 'zh-CN' ? 'CN:zh-Hans' : 'US:en';
  const q    = encodeURIComponent(keyword + ' when:' + timerange);
  const rssUrl = `https://news.google.com/rss/search?q=${q}&hl=${hl}&gl=${gl}&ceid=${ceid}`;

  let items = null;
  let lastError = '';
  let usedProxy = '';

  for (const proxy of NEWS_PROXIES) {
    statusEl.textContent = `RSS 嘗試 ${proxy.name}…`;
    try {
      const url  = proxy.buildUrl(rssUrl);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      let resp;
      try {
        resp = await fetch(url, { signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      if (proxy.type === 'json') {
        const data = await resp.json();
        if (data.status !== 'ok') throw new Error(data.message || '解析失敗');
        items = (data.items || []).map(i => ({
          title:   i.title   || '',
          desc:    (i.description || '').replace(/<[^>]*>/g,'').trim(),
          link:    i.link    || '#',
          source:  i.source  || i.author || '',
          pubDate: i.pubDate || '',
          img:     i.enclosure?.link || i.thumbnail || ''
        }));
      } else {
        let xmlText = '';
        if (proxy.type === 'xml-wrapped') {
          const json = await resp.json();
          xmlText = json.contents || '';
        } else {
          xmlText = await resp.text();
        }
        items = parseRssXml(xmlText);
      }

      if (items && items.length > 0) { usedProxy = proxy.name; break; }
      throw new Error('解析結果為空');
    } catch(e) {
      lastError = `${proxy.name}: ${e.message}`;
      items = null;
    }
  }

  if (!items || !items.length) {
    gridEl.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div style="font-size:28px;margin-bottom:10px">📡</div>
        <div style="font-weight:600;margin-bottom:6px">RSS 暫時無法載入</div>
        <div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);
          background:var(--border-light);padding:8px 12px;border-radius:6px;
          max-width:400px;margin:8px auto 12px">${esc(lastError)}</div>
        <button class="btn btn-primary" onclick="loadNewsFromRSS()">🔄 重試</button>
      </div>`;
    statusEl.textContent = '';
    return;
  }

  renderNewsCards(items, false);
  newsLoaded = true;
  const now = new Date().toLocaleString('zh-TW');
  statusEl.innerHTML = `
    <span style="color:var(--text-secondary)">RSS (${usedProxy})</span>
    　共 ${items.length} 則　· 更新於 ${now}`;
}

// ──────────────────────────────────────────────────
// 用瀏覽器內建 DOMParser 解析 RSS XML
// ──────────────────────────────────────────────────
function parseRssXml(xmlText) {
  try {
    const parser  = new DOMParser();
    const doc     = parser.parseFromString(xmlText, 'text/xml');
    const entries = doc.querySelectorAll('item');
    if (!entries.length) return [];
    const stripHtml = s => (s || '').replace(/<[^>]*>/g, '').trim();
    return Array.from(entries).map(el => {
      const get = tag => el.querySelector(tag)?.textContent || '';
      return {
        title:   stripHtml(get('title')),
        link:    get('link') || el.querySelector('guid')?.textContent || '#',
        desc:    stripHtml(get('description')),
        pubDate: get('pubDate'),
        source:  el.querySelector('source')?.textContent || '',
        img:     el.querySelector('media\:content')?.getAttribute('url') ||
                 el.querySelector('enclosure')?.getAttribute('url') || ''
      };
    });
  } catch(e) { return []; }
}

// ──────────────────────────────────────────────────
// 渲染新聞卡片
// isGCS=true：顯示 Gemini 產生的 category/region/impact badge
// ──────────────────────────────────────────────────
function renderNewsCards(items, isGCS = false) {
  const gridEl = document.getElementById('news-grid');
  const impactStyle = {
    high:   'background:#FDECEA;color:#B03A2E;border:1px solid #F5B7B1',
    medium: 'background:#FEF9E7;color:#9A6700;border:1px solid #FAD77B',
    low:    'background:#EAFAF1;color:#1E8449;border:1px solid #A9DFBF'
  };
  const impactLabel = { high:'高影響', medium:'中影響', low:'低影響' };

  gridEl.innerHTML = items.map(item => {
    const link     = item.link || '#';
    const safeLink = link.replace(/'/g, '%27');
    const pubDate  = item.pubDate
      ? new Date(item.pubDate).toLocaleDateString('zh-TW',
          { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
      : '';
    const impact = item.impact || 'medium';

    const gcsBadges = isGCS ? `
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
        ${item.category ? `<span style="background:var(--accent-pale);color:var(--accent);
          border:1px solid #DDB8A8;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600">
          ${esc(item.category)}</span>` : ''}
        ${item.region ? `<span style="background:#E8EEF8;color:var(--primary);
          border:1px solid #C5D2EA;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600">
          ${esc(item.region)}</span>` : ''}
        <span style="${impactStyle[impact] || impactStyle.medium};
          padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700">
          ${impactLabel[impact] || '中影響'}</span>
      </div>` : '';

    return `
      <div class="news-card" onclick="window.open('${safeLink}','_blank')">
        <div class="news-card-img">
          ${item.img
            ? `<img src="${esc(item.img)}" alt="" loading="lazy"
                onerror="this.parentNode.innerHTML='<span style=font-size:32px>📰</span>'">`
            : '<span style="font-size:32px">📰</span>'}
        </div>
        <div class="news-card-body">
          ${gcsBadges}
          ${item.source ? `<div class="news-card-source">${esc(item.source)}</div>` : ''}
          <div class="news-card-title">${esc(item.title)}</div>
          ${item.desc ? `<div class="news-card-desc">${esc(item.desc)}</div>` : ''}
          <div class="news-card-footer">
            <span>${pubDate}</span>
            ${link !== '#'
              ? `<a href="${link}" target="_blank" onclick="event.stopPropagation()">閱讀全文 →</a>`
              : '<span style="color:var(--text-muted)">Gemini 摘要</span>'}
          </div>
        </div>
      </div>`;
  }).join('');
}

//   risk_level   : high | mid | low

async function loadReports() {
  const rawUrl = document.getElementById('report-sheets-url').value.trim();
  if (!rawUrl) { alert('請先貼上報告 Google Sheets CSV 連結'); return; }

  let csvUrl = rawUrl;
  const m = rawUrl.match(/\/spreadsheets\/d\//);
  const m2 = rawUrl.match(/\/spreadsheets\/d\/([\w-]+)/);
  if (m2) {
    const gidMatch = rawUrl.match(/[#&?]gid=(\d+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    csvUrl = `https://docs.google.com/spreadsheets/d/${m2[1]}/export?format=csv&gid=${gid}`;
  }

  setReportStatus(false, '載入中…');
  try {
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    REPORTS = parseReportCSV(text);
    if (!REPORTS.length) throw new Error('無法解析 CSV，請確認欄位名稱');
    setReportStatus(true, `已載入 ${REPORTS.length} 份報告`);
    renderReportList();
  } catch(e) {
    setReportStatus(false, '載入失敗：' + e.message);
  }
}

function parseReportCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx]||'').trim().replace(/^"|"$/g,''); });
    if (obj.title || obj['標題']) {
      rows.push({
        period_type:  obj.period_type  || obj['期別類型'] || 'week',
        period_label: obj.period_label || obj['期別標籤'] || '',
        title:        obj.title        || obj['標題']     || '',
        summary:      obj.summary      || obj['摘要']     || '',
        content:      obj.content      || obj['內文']     || '',
        risk_level:   obj.risk_level   || obj['風險等級'] || 'mid',
        tags:         obj.tags         || obj['標籤']     || ''
      });
    }
  }
  return rows;
}

function renderReportList() {
  const listEl = document.getElementById('report-list');
  if (!REPORTS.length) {
    listEl.innerHTML = '<div class="empty-state">請貼上 Google Sheets CSV 連結並載入報告</div>';
    document.getElementById('rpt-count').textContent = '';
    return;
  }

  const filtered = REPORTS.filter(r => r.period_type === currentReportTab);
  document.getElementById('rpt-count').textContent = `共 ${filtered.length} 份`;

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty-state">此期別暫無報告</div>';
    return;
  }

  // Sort by period_label descending (newest first)
  const sorted = [...filtered].sort((a,b) => b.period_label.localeCompare(a.period_label));

  listEl.innerHTML = sorted.map((rpt, idx) => {
    const riskLabel = {high:'高風險',mid:'中風險',low:'低風險'}[rpt.risk_level] || '中風險';
    const riskClass = {high:'risk-high',mid:'risk-mid',low:'risk-low'}[rpt.risk_level] || 'risk-mid';
    const tags = rpt.tags ? rpt.tags.split(',').map(t => t.trim()).filter(Boolean) : [];

    // Format content: lines starting with ## become <h4>
    const formattedContent = esc(rpt.content)
      .split('\n')
      .map(line => {
        if (line.startsWith('## ')) return `<h4>${line.slice(3)}</h4>`;
        if (line === '') return '<div class="report-divider"></div>';
        return line;
      })
      .join('\n');

    return `
      <div class="report-card">
        <div class="report-card-header" onclick="toggleReport(${idx})">
          <span class="report-period-badge">${esc(rpt.period_label)}</span>
          <div class="report-card-meta">
            <div class="report-card-title">${esc(rpt.title)}</div>
            <div class="report-card-summary">${esc(rpt.summary)}</div>
            ${tags.length ? `<div class="report-card-tags">${tags.map(t=>`<span class="report-tag">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
          <span class="risk-badge ${riskClass}">${riskLabel}</span>
          <span class="report-toggle" id="toggle-icon-${idx}">＋</span>
        </div>
        <div class="report-card-body" id="report-body-${idx}">
          <div class="report-body-content">${formattedContent}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleReport(idx) {
  const body = document.getElementById(`report-body-${idx}`);
  const icon = document.getElementById(`toggle-icon-${idx}`);
  const isOpen = body.classList.toggle('open');
  icon.textContent = isOpen ? '－' : '＋';
}

function setReportStatus(ok, msg) {
  const dot = document.getElementById('rpt-dot');
  dot.className = 'dot ' + (ok ? 'ok' : 'err');
  document.getElementById('rpt-status').textContent = msg;
}
