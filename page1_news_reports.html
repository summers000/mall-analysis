<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Retail Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #0F2B63;
  --navy-dark:   #091C45;
  --navy-mid:    #1A3A7A;
  --brick:       #A2543B;
  --brick-light: #C4715A;
  --brick-pale:  #F5EDE9;
  --bg:          #F5F0EA;
  --card:        #FFFFFF;
  --border:      #DDD7CE;
  --border-lt:   #EDE8E0;
  --text:        #1A1A2E;
  --text-2:      #5C5C72;
  --text-3:      #9B96A3;
  --success:     #2D7D52;
  --error:       #B03A2E;
  --font: 'Noto Sans TC', 'Microsoft JhengHei', 'Heiti TC', sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --r:    0px;
  --r-sm: 0px;
  --r-lg: 0px;
  --sh:   0 2px 12px rgba(15,43,99,.10);
  --sh-md:0 4px 20px rgba(15,43,99,.14);
}

html, body {
  font-family: var(--font);
  font-size: 16px; line-height: 1.6;
  background: var(--bg); color: var(--text);
  width: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

#app-root {
  width: 100%; min-height: 100vh;
}

/* tabs removed */

/* ── Content area ── */
#content-area { width: 100%; }

/* ── Loading overlay ── */
#loading-overlay {
  position: fixed; inset: 0;
  background: rgba(245,240,234,.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--navy);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { color: var(--text-2); font-size: 14px; font-weight: 500; }

/* ════════════════════════════
   TOP-10 NEWS SECTION
   ════════════════════════════ */
.news-section {
  background: var(--bg);
  padding: 32px 40px 40px;
}
.news-section-header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 6px; flex-wrap: wrap; gap: 12px;
}
.news-section-header h2 {
  font-size: 22px; font-weight: 700; color: var(--navy);
  display: flex; align-items: center; gap: 10px;
}
.news-section-header h2::before {
  content: ''; display: block; width: 4px; height: 22px;
  background: var(--brick); border-radius: 2px; flex-shrink: 0;
}
.news-ctrl { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.news-ctrl select {
  padding: 7px 12px; border: 1px solid var(--border);
  border-radius: var(--r-sm); font-family: var(--font); font-size: 13px;
  background: var(--card); color: var(--text);
}
.news-ctrl select:focus { outline: none; border-color: var(--navy); }
.news-btn {
  padding: 7px 16px; border: none; border-radius: var(--r-sm);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background .15s;
}
.news-btn-primary { background: var(--navy); color: #fff; }
.news-btn-primary:hover { background: var(--navy-dark); }
.news-btn-ghost {
  background: transparent; border: 1px solid var(--border); color: var(--text-2);
}
.news-btn-ghost:hover { border-color: var(--brick); color: var(--brick); }
#news-status {
  font-size: 12px; color: var(--text-3); font-family: var(--mono);
  margin-bottom: 20px; min-height: 18px;
}

/* ── Hero card (rank #1, full width) ── */
.news-hero-card {
  background: var(--card); border: 1px solid var(--border-lt);
  border-radius: var(--r-lg); overflow: hidden; cursor: pointer;
  display: grid; grid-template-columns: 5fr 7fr;
  box-shadow: var(--sh); margin-bottom: 14px;
  transition: box-shadow .2s, border-color .2s;
  min-height: 200px;
}
.news-hero-card:hover { box-shadow: var(--sh-md); border-color: var(--brick); }
.news-hero-card.selected { border: 2px solid var(--brick); box-shadow: 0 0 0 2px var(--brick); }
.news-hero-img {
  background: linear-gradient(135deg, #E8EEF8, #D0DCEE);
  overflow: hidden;
}
.news-hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.news-hero-body {
  padding: 24px 28px;
  display: flex; flex-direction: column; justify-content: space-between;
  border-left: 4px solid var(--accent, var(--brick));
}
.news-hero-rank {
  display: inline-block; background: var(--navy); color: #fff;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 4px; margin-bottom: 10px;
}
.news-hero-cat {
  font-size: 11px; font-weight: 700; color: var(--brick);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
}
.news-hero-title {
  font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.45;
  margin-bottom: 10px;
}
.news-hero-desc {
  font-size: 14px; color: var(--text-2); line-height: 1.65; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 14px;
}
.news-hero-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 12px; border-top: 1px solid var(--border-lt);
  font-size: 12px; color: var(--text-3);
}

/* ── 3-column rows ── */
.news-row3 {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 14px;
}
@media (max-width: 700px) { .news-row3 { grid-template-columns: 1fr; } }

/* ── Small card (rows 2–4) ── */
.news-card {
  background: var(--card); border: 1px solid var(--border-lt);
  border-radius: var(--r-lg); overflow: hidden; cursor: pointer;
  display: flex; flex-direction: column;
  box-shadow: 0 1px 4px rgba(15,43,99,.06);
  transition: box-shadow .2s, transform .2s, border-color .2s;
  position: relative;
}
.news-card:hover { box-shadow: var(--sh-md); transform: translateY(-2px); border-color: var(--brick); }
.news-card.selected { border: 2px solid var(--brick); box-shadow: 0 0 0 2px var(--brick); }
.news-card-rank {
  position: absolute; top: 10px; left: 10px;
  background: var(--navy); color: #fff;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; z-index: 1;
}
/* ── 有圖才顯示圖片區塊，無圖則不保留空白 ── */
.news-card-img {
  width: 100%; height: 130px; overflow: hidden; flex-shrink: 0;
}
.news-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.news-card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.news-card-cat {
  font-size: 10px; font-weight: 700; color: var(--brick);
  text-transform: uppercase; letter-spacing: .08em;
}
.news-card-title {
  font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.news-card-desc {
  font-size: 12px; color: var(--text-2); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  flex: 1;
}
.news-card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border-lt);
  font-size: 11px; color: var(--text-3);
}
.news-card-analyze {
  font-size: 11px; font-weight: 700; color: var(--brick);
  background: var(--brick-pale); padding: 2px 8px;
  border-radius: 4px; border: none; cursor: pointer; font-family: var(--font);
}
.news-card-analyze:hover { background: #EDCABB; }
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-3); font-size: 14px;
}

</style>
</head>
<body>
<div id="app-root">

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">初始化中…</p>
</div>



<div id="content-area">

  <!-- ① 本週全球零售十大新聞 -->
  <section class="news-section">
    <div class="news-section-header">
      <h2>本週全球零售十大新聞</h2>
      <div class="news-ctrl">
        <input type="text" id="newsApiKeyInput"
          placeholder="World News API Key"
          autocomplete="off"
          style="padding:7px 12px;border:1px solid var(--border);font-family:var(--font);
            font-size:13px;background:var(--card);color:var(--text);min-width:180px;">
        <button class="news-btn news-btn-primary" onclick="saveNewsApiKey()" id="newsKeyConfirmBtn">確認</button>
        <div style="width:1px;height:24px;background:var(--border);flex-shrink:0"></div>
        <select id="news-timerange">
          <option value="1">最近 1 天</option>
          <option value="3" selected>最近 3 天</option>
          <option value="7">最近 1 週</option>
        </select>
        <button class="news-btn news-btn-primary" onclick="loadNews()" id="fetchNewsBtn" disabled
          style="opacity:.45;cursor:not-allowed">🔄 抓取新聞</button>
        <button class="news-btn news-btn-ghost" onclick="openGoogleNews()">🔗 Google 新聞</button>
      </div>
    </div>
    <div id="news-status"></div>
    <div id="news-grid">
      <div class="empty-state">請先填入 NewsAPI Key 並確認，再點擊「🔄 抓取新聞」</div>
    </div>
  </section>




</div><!-- /content-area -->
<script>
// ════════════════════════════════════
// CONFIG — 預填你的 World News API Key
// ════════════════════════════════════
let NEWS_API_KEY = '';  // 例如 'abc123...'

// ── NewsAPI Key 管理 ──
function saveNewsApiKey() {
  const val = document.getElementById('newsApiKeyInput').value.trim();
  if (!val) { alert('請輸入 World News API Key'); return; }
  NEWS_API_KEY = val;
  const inp = document.getElementById('newsApiKeyInput');
  const btn = document.getElementById('newsKeyConfirmBtn');
  inp.value = ''; inp.placeholder = 'World News Key 已設定 ✓';
  inp.disabled = true; inp.style.opacity = '.6';
  btn.textContent = '重設'; btn.onclick = resetNewsApiKey;
  const fb = document.getElementById('fetchNewsBtn');
  fb.disabled = false; fb.style.opacity = '1'; fb.style.cursor = 'pointer';
}
function resetNewsApiKey() {
  NEWS_API_KEY = '';
  const inp = document.getElementById('newsApiKeyInput');
  const btn = document.getElementById('newsKeyConfirmBtn');
  inp.placeholder = 'World News API Key'; inp.disabled = false; inp.style.opacity = '1';
  btn.textContent = '確認'; btn.onclick = saveNewsApiKey;
  const fb = document.getElementById('fetchNewsBtn');
  fb.disabled = true; fb.style.opacity = '.45'; fb.style.cursor = 'not-allowed';
}

// ════════════════════════════════════
// WORLD NEWS API — 抓取新聞
// ════════════════════════════════════
async function loadNews() {
  const statusEl = document.getElementById('news-status');
  const gridEl   = document.getElementById('news-grid');

  if (!NEWS_API_KEY) {
    gridEl.innerHTML = '<div class="empty-state">請先填入 World News API Key</div>';
    return;
  }

  statusEl.textContent = '抓取新聞中…';
  gridEl.innerHTML = '<div class="empty-state">載入新聞中，請稍候…</div>';

  const BASE = 'https://api.worldnewsapi.com/search-news';
  const kwZh = '零售 OR 百貨 OR 電商 OR 超市 OR 購物 OR 量販 OR 快時尚 OR 消費';
  const kwEn = 'retail OR supermarket OR ecommerce OR fashion OR FMCG OR mall';
  const HDRS = { 'x-api-key': NEWS_API_KEY };

  try {
    const r1 = await fetch(
      BASE + '?text=' + encodeURIComponent(kwZh) +
      '&source-country=tw&language=zh&number=10&sort=publish-time&sort-direction=DESC',
      { headers: HDRS }
    );
    const d1 = await r1.json();
    let articles = d1.news || [];

    if (articles.length < 5) {
      const r2 = await fetch(
        BASE + '?text=' + encodeURIComponent(kwZh) +
        '&language=zh&number=10&sort=publish-time&sort-direction=DESC',
        { headers: HDRS }
      );
      const d2 = await r2.json();
      const extra = (d2.news || []).filter(a => !articles.find(b => b.url === a.url));
      articles = [...articles, ...extra];
    }

    if (articles.length < 5) {
      const r3 = await fetch(
        BASE + '?text=' + encodeURIComponent(kwEn) +
        '&language=en&number=10&sort=publish-time&sort-direction=DESC',
        { headers: HDRS }
      );
      const d3 = await r3.json();
      const extra = (d3.news || []).filter(a => !articles.find(b => b.url === a.url));
      articles = [...articles, ...extra];
    }

    if (!articles.length) throw new Error('找不到相關新聞，請稍後再試');

    const normalized = articles.slice(0, 10).map((a, i) => ({
      title:    a.title || '',
      desc:     a.summary || (a.text ? a.text.slice(0, 150) : ''),
      link:     a.url || '',
      source:   a.source_country || (a.authors && a.authors[0]) || '',
      pubDate:  a.publish_date || '',
      img:      a.image || '',
      category: CARD_CATS[i % CARD_CATS.length]
    }));

    renderCards(normalized);
    statusEl.textContent = '共 ' + normalized.length + ' 則  ·  World News API  ·  ' + new Date().toLocaleString('zh-TW');

  } catch(err) {
    console.error(err);
    gridEl.innerHTML =
      '<div class="empty-state">' +
      '<div style="font-size:28px;margin-bottom:10px">📡</div>' +
      '<div style="font-weight:600;margin-bottom:8px">新聞載入失敗</div>' +
      '<div style="font-size:11px;font-family:var(--mono);background:var(--border-lt);' +
      'padding:8px 12px;max-width:400px;margin:8px auto 14px;text-align:left">' + escT(err.message) + '</div>' +
      '<button class="news-btn news-btn-primary" onclick="loadNews()" style="margin-right:8px">🔄 重試</button>' +
      '<a href="https://news.google.com/search?q=' + encodeURIComponent('零售 百貨 電商') +
      '&hl=zh-TW" target="_blank" class="news-btn news-btn-ghost" style="text-decoration:none">🔗 Google 新聞</a>' +
      '</div>';
    statusEl.textContent = '';
  }
}

// ════════════════════════════════════
// 渲染新聞卡片
// 點卡片 → 新分頁開啟原始連結
// ════════════════════════════════════
const CARD_CATS = ['全球市場','電商','實體零售','快時尚','品牌動態','投資併購','供應鏈','資安數位','消費趨勢','台灣零售'];

function imgBlock(img, isHero) {
  if (!img) return '';
  return '<div class="' + (isHero ? 'news-hero-img' : 'news-card-img') + '">' +
    '<img src="' + escAttr(img) + '" alt="" loading="lazy" onerror="this.parentNode.remove()">' +
    '</div>';
}

function renderCards(items) {
  const grid = document.getElementById('news-grid');
  if (!items.length) { grid.innerHTML = '<div class="empty-state">找不到相關新聞</div>'; return; }

  const hero = items[0];
  const heroCat = hero.category || CARD_CATS[0];
  const heroDate = hero.pubDate ? new Date(hero.pubDate).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}) : '';

  // 第一則：大圖橫幅，點擊開啟原始連結
  var html = '<a href="' + escAttr(hero.link) + '" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block">' +
    '<div class="news-hero-card selected" id="nc-0">' +
    imgBlock(hero.img, true) +
    '<div class="news-hero-body">' +
    '<span class="news-hero-rank">#1</span>' +
    '<div class="news-hero-cat">' + escT(heroCat) + '</div>' +
    '<div class="news-hero-title">' + escT(hero.title) + '</div>' +
    (hero.desc ? '<div class="news-hero-desc">' + escT(hero.desc) + '</div>' : '') +
    '<div class="news-hero-footer"><span>' + escT(hero.source) + ' ' + heroDate + '</span></div>' +
    '</div></div></a>';

  // 其餘：每排 3 則
  var rest = items.slice(1, 10);
  for (var rs = 0; rs < rest.length; rs += 3) {
    html += '<div class="news-row3">';
    rest.slice(rs, rs+3).forEach(function(item, ri) {
      var i = rs + ri + 1;
      var cat = item.category || CARD_CATS[i % CARD_CATS.length];
      var date = item.pubDate ? new Date(item.pubDate).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}) : '';
      html += '<a href="' + escAttr(item.link) + '" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:flex;flex-direction:column">' +
        '<div class="news-card" id="nc-' + i + '">' +
        '<div class="news-card-rank">#' + (i+1) + '</div>' +
        imgBlock(item.img, false) +
        '<div class="news-card-body">' +
        '<div class="news-card-cat">' + escT(cat) + '</div>' +
        '<div class="news-card-title">' + escT(item.title) + '</div>' +
        (item.desc ? '<div class="news-card-desc">' + escT(item.desc) + '</div>' : '') +
        '<div class="news-card-footer"><span>' + escT(item.source) + ' ' + date + '</span></div>' +
        '</div></div></a>';
    });
    html += '</div>';
  }
  grid.innerHTML = html;
}

function openGoogleNews() {
  window.open('https://news.google.com/search?q=' + encodeURIComponent('零售 百貨 電商') + '&hl=zh-TW&gl=TW', '_blank');
}

function escT(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,"&#39;");
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loading-overlay').style.display = 'none';
  if (NEWS_API_KEY) {
    const inp = document.getElementById('newsApiKeyInput');
    const btn = document.getElementById('newsKeyConfirmBtn');
    inp.placeholder = 'World News Key 已預設 ✓';
    inp.disabled = true; inp.style.opacity = '.6';
    btn.textContent = '重設'; btn.onclick = resetNewsApiKey;
    const fb = document.getElementById('fetchNewsBtn');
    fb.disabled = false; fb.style.opacity = '1'; fb.style.cursor = 'pointer';
  }
});
</script>
</div><!-- /app-root -->
</body>
</html>
